openapi: 3.1.0
info:
  title: Project Luigi API
  description: |
    Household budgeting and finance management API.
    Extracted from the existing tRPC-based implementation for migration to a standalone REST backend with PostgreSQL.

    ## Authentication
    All endpoints (except where noted) require a valid Bearer token (Clerk JWT).
    The authenticated user's ID is derived from the token — it is **no longer passed in the request body**.

    ## Key Concepts
    - **Household** — Top-level unit. Users, accounts, budgets, and categories are scoped to a household.
    - **Budget** — A spending plan linked to categories and accounts via many-to-many join tables.
    - **Account** — A financial account (bank, cash, etc.) with an initial balance.
    - **Category** — Tagged as INCOME, EXPENSE, or both. Linked to budgets.
    - **Transaction** — An income or expense entry tied to an account and optionally a budget.
    - **Transfer** — Moves funds between two accounts within the same budget.
    - **Bill / Bill** — A bill template and its generated instances.
    - **Income** — A recurring income source definition.
    - **Recipient** — A payee or payer, scoped to a household.
    - **Invitation** — Email-based invite to join a household.
    - **Allocation** — Funds allocated (or transferred) between budgets.

    ## Snapshot Architecture
    - **Current balances** are updated synchronously on every transaction create/update/delete.
    - **Daily snapshots** are written once per day for all accounts and budgets.
    - **Backdated changes** mark account history as stale and trigger targeted async snapshot rebuilds.

    Clients should treat any snapshot dates **on or after** `historyRecalcFrom` as provisional while `staleHistory` is true.

    ## Pagination
    List endpoints support optional `limit` and `offset` (default 0) query parameters. If `limit` is **omitted**, the full dataset is returned. If provided, `limit` must be between 0 and 100: use `limit=0` to fetch only the total count in the pagination metadata; use 1–100 to cap the number of items. Responses include pagination metadata.

    ## Dates and timestamps
    - **Dates** (`format: date`, `YYYY-MM-DD`) are plain calendar dates in **responses** where noted (for example snapshot rows and chart day keys).
    - **Timestamps** (`format: date-time`) must be ISO 8601 instants in **UTC** with a **`Z`** suffix (for example `2024-06-01T12:00:00.000Z`). Numeric offsets such as `+00:00` are not accepted on input.
    - **Dashboard and snapshot history** query parameters `dateFrom` / `dateTo` use **`date-time`** (UTC Zulu). The server uses the instants **inclusively** for transaction aggregates (`period-summary`). For **daily** account/budget snapshot rows, each bound is mapped to its **UTC calendar date** for filtering; chart `dates` are still one ISO calendar date per day between those UTC dates (inclusive).
    - **Responses** serialize timestamps with a `Z` suffix and three fractional digits.

    ## Empty List Behavior
    List endpoints always return `200` with an empty `data` array when no matches are found. `404` is reserved for missing parent resources (for example, an unknown `householdId` or `budgetId`).
  version: 1.0.0
  contact:
    name: Project Yoshi

servers:
  - url: /api/v1
    description: API v1

# ─────────────────────────────────────────────
# Security
# ─────────────────────────────────────────────
security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ───────── Enums ─────────
  schemas:
    CategoryType:
      type: string
      enum: [INCOME, EXPENSE]

    RecurrenceType:
      type: string
      enum: [NONE, WEEKLY, MONTHLY, QUARTERLY, YEARLY, CUSTOM]

    InvitationStatus:
      type: string
      enum: [PENDING, ACCEPTED, DECLINED]

    RecipientScope:
      type: string
      enum: [BILL, TRANSACTION]
    TransactionType:
      type: string
      enum: [EXPENSE, INCOME, TRANSFER]
    TransactionStatus:
      type: string
      enum: [PENDING, EFFECTIVE]

    BillInstanceStatus:
      type: string
      description: |
        **Derived on each response** from `dueDate` (timezone-aware instant vs **UTC now**) and whether a transaction is
        linked (`transaction` / underlying `transactionId`). Not persisted; no scheduled job updates it.

        - **UPCOMING** — due instant is after UTC now; no linked transaction.
        - **HANDLED** — due instant is after UTC now; linked transaction (e.g. paid early).
        - **OVERDUE** — due instant is on or before UTC now; no linked transaction.
        - **PAID** — due instant is on or before UTC now; linked transaction.

        Writers sending `dueDate` for new or updated bills/instances should use **timezone-aware** `date-time` values.
        **Preferred:** equivalent UTC (`...Z`). **Acceptable:** local start-of-day with offset (e.g. `T00:00:00-07:00`) when
        the client cannot normalize to UTC. Avoid sending `...T00:00:00Z` for a “local calendar day” unless UTC midnight
        is intentionally meant.
      enum: [UPCOMING, HANDLED, OVERDUE, PAID]

    IncomeInstanceStatus:
      type: string
      description: |
        **Derived on each response** from `expectedDate` (timezone-aware instant vs **UTC now**) and whether a transaction
        is linked (`transaction` / `transactionId`). Not persisted; no scheduled job updates it.

        - **UPCOMING** — expected instant is after UTC now; no linked transaction.
        - **HANDLED** — expected instant is after UTC now; linked transaction.
        - **OVERDUE** — expected instant is on or before UTC now; no linked transaction.
        - **RECEIVED** — expected instant is on or before UTC now; linked transaction.

        Same **date-time** guidance as `BillInstanceStatus`: prefer UTC instant; offset local start-of-day is acceptable
        when the client cannot convert to UTC; do not mistake `Z` for the user’s local midnight.
      enum: [UPCOMING, HANDLED, OVERDUE, RECEIVED]

    BillPaymentHandling:
      type: string
      description: |
        How the recurring bill is paid or delivered (Swedish UI “Hantering”): direct debit, e-invoice, mail, vendor portal, paper, etc.
      enum: [AUTOGIRO, E_INVOICE, MAIL, PORTAL, PAPER]

    # ───────── Core Models ─────────
    Household:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        _count:
          type: object
          properties:
            users:
              type: integer
            budgets:
              type: integer
            categories:
              type: integer
            accounts:
              type: integer
      required: [id, name, createdAt]

    HouseholdUser:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        householdId:
          type: string
        joinedAt:
          type: string
          format: date-time
      required: [id, userId, householdId, joinedAt]

    UserSettings:
      type: object
      properties:
        userId:
          type: string
        defaultHouseholdId:
          type: [string, "null"]
      required: [userId]

    UserHouseholdSettings:
      type: object
      properties:
        userId:
          type: string
        householdId:
          type: string
        defaultBudgetId:
          type: [string, "null"]
      required: [userId, householdId]

    HouseholdMember:
      allOf:
        - $ref: '#/components/schemas/HouseholdUser'
        - type: object
          properties:
            user:
              type: [object, "null"]
              properties:
                id:
                  type: string
                firstName:
                  type: [string, "null"]
                lastName:
                  type: [string, "null"]
                fullName:
                  type: [string, "null"]
                imageUrl:
                  type: [string, "null"]
                email:
                  type: [string, "null"]

    Account:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        externalIdentifier:
          type: [string, "null"]
        initialBalance:
          type: number
          format: double
        householdId:
          type: string
        archived:
          type: boolean
        createdAt:
          type: string
          format: date-time
        _count:
          type: object
          properties:
            transactions:
              type: integer
            budgets:
              type: integer
      required: [id, name, initialBalance, householdId, archived, createdAt]

    AccountDetail:
      allOf:
        - $ref: '#/components/schemas/Account'
        - type: object
          properties:
            budgets:
              type: array
              items:
                $ref: '#/components/schemas/Budget'
          required: [budgets]

    AccountWithBalance:
      allOf:
        - $ref: '#/components/schemas/Account'
        - type: object
          properties:
            currentBalance:
              type: number
              format: double
          required: [currentBalance]

    AccountBalance:
      type: object
      properties:
        account:
          $ref: '#/components/schemas/RelationRef'
        initialBalance:
          type: number
          format: double
        currentBalance:
          type: number
          format: double
        transactionCount:
          type: integer
        latestSnapshot:
          $ref: '#/components/schemas/AccountBalanceSnapshot'
        staleHistory:
          type: boolean
        historyRecalcFrom:
          type: [string, "null"]
          format: date
      required: [account, initialBalance, currentBalance, transactionCount, staleHistory]

    Budget:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        startDate:
          type: string
          format: date-time
        householdId:
          type: string
        createdAt:
          type: string
          format: date-time
        allocatedAmount:
          type: number
          format: double
        spentAmount:
          type: number
          format: double
        remainingAmount:
          type: number
          format: double
        _count:
          type: object
          properties:
            transactions:
              type: integer
            bills:
              type: integer
            categories:
              type: integer
            accounts:
              type: integer
      required: [id, name, startDate, householdId, createdAt]

    BudgetWithMetrics:
      allOf:
        - $ref: '#/components/schemas/Budget'
        - type: object
          properties:
            isOverdrafted:
              type: boolean
            overdraftAmount:
              type: number
              format: double
          required: [allocatedAmount, spentAmount, remainingAmount, isOverdrafted, overdraftAmount]

    BudgetDetail:
      allOf:
        - $ref: '#/components/schemas/BudgetWithMetrics'
        - type: object
          properties:
            household:
              $ref: '#/components/schemas/Household'
            categories:
              type: array
              items:
                type: object
                properties:
                  budgetId:
                    type: string
                  categoryId:
                    type: string
                  category:
                    $ref: '#/components/schemas/Category'
            accounts:
              type: array
              items:
                type: object
                properties:
                  budgetId:
                    type: string
                  accountId:
                    type: string
                  account:
                    $ref: '#/components/schemas/Account'

    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        types:
          type: array
          items:
            $ref: '#/components/schemas/CategoryType'
        householdId:
          type: string
        archived:
          type: boolean
        createdAt:
          type: string
          format: date-time
        _count:
          type: object
          properties:
            transactions:
              type: integer
            budgets:
              type: integer
      required: [id, name, types, householdId, archived, createdAt]

    CategoryDetail:
      allOf:
        - $ref: '#/components/schemas/Category'
        - type: object
          properties:
            budgets:
              type: array
              items:
                $ref: '#/components/schemas/Budget'
          required: [budgets]

    RelationRef:
      type: object
      properties:
        id:
          type: string
        name:
          type: [string, "null"]
      required: [id, name]

    NullableRelationRef:
      type: [object, "null"]
      properties:
        id:
          type: string
        name:
          type: [string, "null"]
      required: [id, name]

    Transaction:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        amount:
          type: number
          format: double
        date:
          type: string
          format: date-time
        type:
          $ref: '#/components/schemas/TransactionType'
        status:
          $ref: '#/components/schemas/TransactionStatus'
        notes:
          type: [string, "null"]
        household:
          $ref: '#/components/schemas/RelationRef'
        category:
          $ref: '#/components/schemas/NullableRelationRef'
        account:
          $ref: '#/components/schemas/RelationRef'
        transferToAccount:
          $ref: '#/components/schemas/NullableRelationRef'
        budget:
          $ref: '#/components/schemas/NullableRelationRef'
        billInstance:
          $ref: '#/components/schemas/NullableRelationRef'
        bill:
          $ref: '#/components/schemas/NullableRelationRef'
        incomeInstance:
          $ref: '#/components/schemas/NullableRelationRef'
        income:
          $ref: '#/components/schemas/NullableRelationRef'
        incomeSource:
          $ref: '#/components/schemas/NullableRelationRef'
        recipient:
          $ref: '#/components/schemas/NullableRelationRef'
        createdAt:
          type: string
          format: date-time
        splits:
          type: array
          items:
            $ref: '#/components/schemas/TransactionSplit'
      required: [id, name, amount, date, type, status, household, account, createdAt]

    TransactionSplit:
      type: object
      properties:
        id:
          type: string
        transactionId:
          type: string
        categoryId:
          type: string
        budgetId:
          type: [string, "null"]
        amount:
          type: number
          format: double
        subtitle:
          type: string
        category:
          $ref: '#/components/schemas/Category'
        budget:
          $ref: '#/components/schemas/NullableRelationRef'
      required: [id, transactionId, categoryId, amount, subtitle]

    TransactionGroupedByCategory:
      type: object
      properties:
        category:
          $ref: '#/components/schemas/Category'
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        total:
          type: number
          format: double
        count:
          type: integer
      required: [category, transactions, total, count]

    BlueprintPatchScope:
      type: string
      enum: [ALL, UPCOMING]
      description: |
        How a **blueprint** PATCH applies (bills and incomes). **ALL**: apply immediately to the template and to instance rows
        per propagation rules; **`fromDate` must be omitted**; **`recurrenceType`** and **`customIntervalDays`** must not be sent.
        **UPCOMING**: schedule one or more field changes from **`fromDate`** as **scheduled revisions** (one revision row **per request field whose effective value at `fromDate` actually changes**—unchanged values do not get a row);
        **`fromDate` is required** on the request. Scheduled rows are listed with **`GET …/revisions`**; cancel with **`DELETE …/revisions/{revisionId}`**
        while **`scheduled`** is true. The blueprint is updated when **`effectiveFrom` ≤ now** (background job), and the same revision row is kept (**`scheduled`** becomes false).

    BillRevisionChange:
      type: object
      description: A single field change within a blueprint revision entry.
      properties:
        field:
          type: string
          description: Blueprint field name in camelCase (e.g. estimatedAmount, recurrenceType, splits).
        previousValue: {}
        newValue: {}
      required: [field, previousValue, newValue]

    BillRevision:
      type: object
      description: |
        One logical revision entry for a recurring **bill blueprint** (`PUT`/`PATCH` on the Bill resource).
        Instance-only edits (`PATCH` bill-instances) are not included.
        On **bill creation**, the server records one **initial** revision whose **`changes`** list contains every blueprint field
        with **`previousValue` null** (JSON null), **`newValue`** set to the initial value, and **`createdAt`** equal to the bill’s **`createdAt`**.
        Blueprint **`PATCH`** with **`updateScope` `ALL`** updates that same bundled snapshot in place (adjusted fields get new **`newValue`**; no extra logical revision).
        Other blueprint edits (e.g. **`UPCOMING`**, archive) add revisions with **exactly one** element in **`changes`** (one field per revision), matching one persisted row.
        The revision **`id`** is always a real persisted row id; for the bundled creation revision it is the **lexicographically smallest**
        row id among the merged snapshot rows (suitable for display only—**`DELETE …/revisions/{revisionId}`** still targets a single pending row by its own id).
      properties:
        id:
          type: string
        billId:
          type: string
        userId:
          type: string
          description: Authenticated user (e.g. Clerk `sub`) who applied the change.
        createdAt:
          type: string
          format: date-time
        effectiveFrom:
          type: [string, "null"]
          format: date-time
          description: |
            For **immediate** edits: set when a schedule-related field was changed (typically blueprint `dueDate` after the edit).
            For **scheduled** (`UPCOMING`) revisions: the instant from which the change applies to instances and, once reached, to the blueprint.
            On the **bundled creation** revision, set to the same instant as **`createdAt`** (the blueprint’s **`createdAt`**).
        scope:
          type: [string, "null"]
          description: |
            Recorded patch scope when applicable (**ALL**, **UPCOMING**). Older rows may contain legacy values (**INSTANCE**, **FUTURE**).
        changes:
          type: array
          items:
            $ref: '#/components/schemas/BillRevisionChange'
          description: Field-level deltas for this revision. One entry per later edit; all initial fields for the creation snapshot.
        scheduled:
          type: boolean
          description: |
            **true** when this revision is not yet applied to the blueprint (pending scheduled change). Omitted when the change is already on the template (history).
      required: [id, billId, userId, createdAt, changes]

    BillRevisionsEnvelope:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BillRevision'
      required: [data]

    IncomeRevisionChange:
      type: object
      description: A single field change within an income blueprint revision entry.
      properties:
        field:
          type: string
          description: Blueprint field name in camelCase (e.g. estimatedAmount, recurrenceType, incomeSourceId).
        previousValue: {}
        newValue: {}
      required: [field, previousValue, newValue]

    IncomeRevision:
      type: object
      description: |
        One logical revision entry for a recurring **income blueprint** (`PUT`/`PATCH` on the Income resource).
        Instance-only edits (`PATCH` income-instances) are not included.
        On **income creation**, the server records one **initial** revision whose **`changes`** list contains every blueprint field
        with **`previousValue` null** (JSON null), **`newValue`** set to the initial value, and **`createdAt`** equal to the income’s **`createdAt`**.
        **`updateScope` `ALL`** merges into that bundled snapshot in place. Other edits add revisions with **exactly one** element in **`changes`**.
        The revision **`id`** for the bundled creation revision is the **lexicographically smallest** row id among the merged snapshot rows.
      properties:
        id:
          type: string
        incomeId:
          type: string
        userId:
          type: string
          description: Authenticated user (e.g. Clerk `sub`) who applied the change.
        createdAt:
          type: string
          format: date-time
        effectiveFrom:
          type: [string, "null"]
          format: date-time
          description: |
            For **immediate** edits: set when a schedule-related field was changed (typically blueprint `expectedDate` after the edit).
            For **scheduled** (`UPCOMING`) revisions: the instant from which the change applies to instances and, once reached, to the blueprint.
            On the **bundled creation** revision, set to the same instant as **`createdAt`** (the blueprint’s **`createdAt`**).
        scope:
          type: [string, "null"]
          description: |
            Recorded patch scope when applicable (**ALL**, **UPCOMING**). Older rows may contain legacy values (**INSTANCE**, **FUTURE**).
        changes:
          type: array
          items:
            $ref: '#/components/schemas/IncomeRevisionChange'
          description: Field-level deltas for this revision. One entry per later edit; all initial fields for the creation snapshot.
        scheduled:
          type: boolean
          description: |
            **true** when this revision is not yet applied to the blueprint (pending scheduled change). Omitted when the change is already on the template (history).
      required: [id, incomeId, userId, createdAt, changes]

    IncomeRevisionsEnvelope:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/IncomeRevision'
      required: [data]

    Bill:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        recipient:
          $ref: '#/components/schemas/RelationRef'
        account:
          $ref: '#/components/schemas/RelationRef'
        dueDate:
          type: string
          format: date-time
          description: |
            Timezone-aware instant anchoring the bill recurrence schedule (blueprint anchor). Prefer UTC (`Z`); offset local start-of-day is acceptable
            when the client cannot normalize (see `BillInstanceStatus` / `BillInstance.dueDate`).
        recurrenceType:
          $ref: '#/components/schemas/RecurrenceType'
        customIntervalDays:
          type: [integer, "null"]
        estimatedAmount:
          type: number
          format: double
        endDate:
          type: [string, "null"]
          format: date-time
        lastPaymentDate:
          type: [string, "null"]
          format: date-time
        paymentHandling:
          anyOf:
            - $ref: '#/components/schemas/BillPaymentHandling'
            - type: "null"
          description: How the bill is paid or received; null when unset (e.g. legacy bills).
        category:
          $ref: '#/components/schemas/NullableRelationRef'
        budget:
          $ref: '#/components/schemas/NullableRelationRef'
        household:
          $ref: '#/components/schemas/RelationRef'
        archived:
          type: boolean
        createdAt:
          type: string
          format: date-time
        numberOfRevisions:
          type: integer
          minimum: 0
          description: |
            Count of **logical** blueprint revision entries returned by **`GET …/revisions`** (newest first).
            **`1`** immediately after blueprint creation (the bundled initial snapshot only).
            Blueprint patches with **`updateScope` `ALL`** merge into that creation bundle (they do not add a new logical revision).
            **`> 1`** after at least one change that adds its own revision (e.g. **`updateScope` `UPCOMING`**, archive, or other non–ALL-bundle edits).
        splits:
          type: array
          items:
            $ref: '#/components/schemas/BillSplit'
          description: |
            Present when the blueprint uses per-line categories/budgets. Each item includes nested **`category`** and **`budget`**
            (when IDs are set) for display and form prefill, same as **`BillInstance.splits`**. Omitted when the bill has no split lines.
      required:
        [
          id,
          name,
          recipient,
          account,
          dueDate,
          recurrenceType,
          estimatedAmount,
          household,
          archived,
          createdAt,
          numberOfRevisions,
        ]

    BillInstance:
      type: object
      description: |
        A flattened view of a bill instance with its recurring bill details.
        Field `status` is computed when the object is returned (see `BillInstanceStatus`).
      properties:
        id:
          type: string
          description: Bill instance ID
        bill:
          $ref: '#/components/schemas/NullableRelationRef'
        name:
          type: string
        recipient:
          $ref: '#/components/schemas/RelationRef'
        amount:
          type: number
          format: double
        paidAmount:
          type: [number, "null"]
          format: double
        dueDate:
          type: string
          format: date-time
          description: |
            When **writing** due dates from a date picker, send a timezone-aware instant. Prefer equivalent UTC (`Z`);
            local start-of-day with offset is acceptable if the client cannot normalize to UTC (see `BillInstanceStatus`).
        budget:
          $ref: '#/components/schemas/NullableRelationRef'
        status:
          $ref: '#/components/schemas/BillInstanceStatus'
        transaction:
          $ref: '#/components/schemas/NullableRelationRef'
        account:
          $ref: '#/components/schemas/NullableRelationRef'
        category:
          $ref: '#/components/schemas/NullableRelationRef'
        splits:
          type: array
          items:
            $ref: '#/components/schemas/BillSplit'
        recurrenceType:
          $ref: '#/components/schemas/RecurrenceType'
        customIntervalDays:
          type: [integer, "null"]
        paymentHandling:
          anyOf:
            - $ref: '#/components/schemas/BillPaymentHandling'
            - type: "null"
          description: |
            When the instance row has an explicit **`paymentHandling`** override, that value is returned; otherwise the value
            is copied from the parent recurring bill. Null means either the parent has no handling or there is no parent bill.
        archived:
          type: boolean
      required: [id, name, recipient, amount, dueDate, status, recurrenceType, archived]

    BillInstancesSummary:
      type: object
      description: |
        Counts of bill instances in each **derived** status bucket (see `BillInstanceStatus`), for filters aligned with
        `GET /bill-instances`. **UTC now** at request time determines upcoming vs overdue vs each instance `dueDate`;
        **HANDLED** / **PAID** require a linked transaction (`transactionId`).
      properties:
        upcomingCount:
          type: integer
          minimum: 0
          description: Due instant after UTC now; no linked transaction.
        handledCount:
          type: integer
          minimum: 0
          description: Due instant after UTC now; linked transaction.
        overdueCount:
          type: integer
          minimum: 0
          description: Due instant on or before UTC now; no linked transaction.
        paidCount:
          type: integer
          minimum: 0
          description: Due instant on or before UTC now; linked transaction.
      required: [upcomingCount, handledCount, overdueCount, paidCount]

    IncomeInstancesSummary:
      type: object
      description: |
        Counts of income instances in each **derived** status bucket (see `IncomeInstanceStatus`), for filters aligned with
        `GET /income-instances`. **UTC now** at request time determines upcoming vs overdue vs each instance `expectedDate`;
        **HANDLED** / **RECEIVED** require a linked transaction (`transactionId`).
      properties:
        upcomingCount:
          type: integer
          minimum: 0
          description: Expected instant after UTC now; no linked transaction.
        handledCount:
          type: integer
          minimum: 0
