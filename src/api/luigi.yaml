  /households/{householdId}/dashboard/period-summary:
    parameters:
      - $ref: '#/components/parameters/householdId'
    get:
      operationId: getHouseholdPeriodSummary
      summary: Income and expense totals for a household date range
      description: |
        Returns **totalIncome** (sum of INCOME), **totalExpense** (sum of EXPENSE), and **net** (totalIncome − totalExpense)
        for transactions whose **date** falls between **dateFrom** and **dateTo** (UTC Zulu instants, inclusive).
        TRANSFER rows are excluded; PENDING and EFFECTIVE rows are included.
      tags: [Households]
      parameters:
        - name: dateFrom
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Period totals for the household
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HouseholdPeriodSummary'
        '404':
          description: Household not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /households/{householdId}/dashboard/account-balance-chart:
    parameters:
      - $ref: '#/components/parameters/householdId'
    get:
      operationId: getHouseholdAccountBalanceChart
      summary: Daily account balance series for dashboard charts
      description: |
        Returns forward-filled **daily** balances for the requested accounts (see `HouseholdAccountBalanceChartResponse`).
        Required `dateFrom` / `dateTo` are UTC Zulu instants; see that schema for how they map to chart days.
        When `accountIds` is omitted, all **non-archived** household accounts are included unless `includeArchived` is true.
        Optional **`projectFromTransactions`**: when true, extends the series using **pending** transactions in the
        chart date range (see response schema); effective rows are not double-counted.
      tags: [Households]
      parameters:
        - name: dateFrom
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: accountIds
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: includeArchived
          in: query
          required: false
          schema:
            type: boolean
        - name: projectFromTransactions
          in: query
          required: false
          description: |
            When true, adjust balances from the chart's current UTC day onward using pending transactions dated
            within the chart's UTC day range (see `HouseholdAccountBalanceChartResponse`).
          schema:
            type: boolean
      responses:
        '200':
          description: Daily balance series for charting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HouseholdAccountBalanceChartResponse'
        '400':
          description: Invalid date range
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Household or account not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  # ─────────────────────────
  # TRANSACTIONS
  # ─────────────────────────
  /transactions:
    get:
      operationId: listTransactions
      summary: List transactions with flexible filters
      tags: [Transactions]
      parameters:
        - name: budgetId
          in: query
          schema:
            type: string
        - name: householdId
          in: query
          schema:
            type: string
        - name: accountId
          in: query
          schema:
            type: string
        - name: billInstanceId
          in: query
          schema:
            type: string
        - name: incomeInstanceId
          in: query
          schema:
            type: string
          description: When set, only transactions linked to this income instance are returned (same scoping column as billInstanceId).
        - name: categoryId
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/TransactionType'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: List of transactions (empty list when no matches; includes virtual transfer entries when no categoryId filter)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transaction'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      operationId: createTransaction
      summary: Create a new transaction
      tags: [Transactions]
      description: |
        Supports inline category creation via `newCategory`, inline recipient creation via `newRecipientName`,
        and transaction splits (each split may use `categoryId`, `newCategoryName`, or split-level `newCategory` whose
        category kind defaults to the transaction type).

        Optional `instanceId` links the transaction to a single **occurrence**: for `EXPENSE` it must be a **bill instance**
        id (from bill-instance APIs); for `INCOME` it must be an **income instance** id. The server stores the link on the
        transaction and on the instance (`transactionId`). Bill/income **instance `status`** in API responses is **derived**
        from the due/expected instant vs UTC now and that link (see `BillInstanceStatus` / `IncomeInstanceStatus`), not from
        a background job. Resolution uses the transaction `type` (wrong kind or other household → 404; already linked
        elsewhere → 422). `TRANSFER` must not send `instanceId` (422).

        This is not the recurring blueprint id (`billId` on bills, or income id on incomes). Additional forward instances
        for recurring blueprints are created by scheduled jobs, not by this endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
      responses:
        '201':
          description: Created transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'

  /transactions/summary:
    get:
      operationId: getTransactionsSummary
      summary: Income, expense, and net totals for filtered transactions
      description: |
        Same scoping filters as **`GET /transactions`** (at least one required), plus required **dateFrom** / **dateTo**.
        Totals match **transaction.amount** sums for **INCOME** / **EXPENSE**; **transactionCount** counts all matching rows
        (including **TRANSFER**). See **`TransactionListSummary`** for full semantics.
      tags: [Transactions]
      parameters:
        - name: householdId
          in: query
          schema:
            type: string
        - name: budgetId
          in: query
          schema:
            type: string
        - name: accountId
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: string
        - name: billInstanceId
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/TransactionType'
      responses:
        '200':
          description: Filtered period totals and row count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionListSummary'
        '404':
          description: Household or account not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /transactions/{transactionId}:
    parameters:
      - $ref: '#/components/parameters/transactionId'
    get:
      operationId: getTransaction
      summary: Get a transaction by ID
      tags: [Transactions]
      responses:
        '200':
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
    patch:
      operationId: updateTransaction
      summary: Update a transaction
      tags: [Transactions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTransactionRequest'
      responses:
        '200':
          description: Updated transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
    delete:
      operationId: deleteTransaction
      summary: Delete a transaction
      tags: [Transactions]
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /transactions/{transactionId}/clone:
    parameters:
      - $ref: '#/components/parameters/transactionId'
    post:
      operationId: cloneTransaction
      summary: Clone a transaction (defaults to today's date)
      tags: [Transactions]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloneTransactionRequest'
      responses:
        '201':
          description: Cloned transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'

  /transactions/grouped-by-category:
    get:
      operationId: getTransactionsGroupedByCategory
      summary: Get transactions grouped by category
      tags: [Transactions]
      parameters:
        - name: budgetId
          in: query
          required: true
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/CategoryType'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: Transactions grouped by category
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TransactionGroupedByCategory'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'

