    HouseholdPeriodSummary:
      type: object
      description: |
        Aggregated INCOME and EXPENSE totals for a household between the request `dateFrom` and `dateTo`
        instants (inclusive on `transaction.date`). TRANSFER transactions are excluded. Both PENDING and
        EFFECTIVE transactions are included when their transaction date falls within the range. Amounts are
        sums of stored transaction values only (not account initial balances). `dateFrom` / `dateTo` in the
        response echo the query bounds as UTC Zulu timestamps.
      properties:
        householdId:
          type: string
        dateFrom:
          type: string
          format: date-time
        dateTo:
          type: string
          format: date-time
        totalIncome:
          type: number
          format: double
        totalExpense:
          type: number
          format: double
        net:
          type: number
          format: double
      required: [householdId, dateFrom, dateTo, totalIncome, totalExpense, net]

    TransactionListSummary:
      type: object
      description: |
        Aggregated totals for rows matching the same filters as **`GET /transactions`** within **dateFrom** / **dateTo**
        (inclusive on **transaction.date**; query parsing matches the list endpoint). **totalIncome** and **totalExpense**
        are sums of stored **transaction.amount** for **INCOME** and **EXPENSE** types only (not account balances).
        **TRANSFER** rows are included in **transactionCount** but contribute **0** to income/expense sums. **net** is
        **totalIncome** − **totalExpense**. **PENDING** and **EFFECTIVE** transactions are included. Response **dateFrom**
        / **dateTo** echo the parsed inclusive bounds as UTC Zulu timestamps.
      properties:
        dateFrom:
          type: string
          format: date-time
        dateTo:
          type: string
          format: date-time
        totalIncome:
          type: number
          format: double
        totalExpense:
          type: number
          format: double
        net:
          type: number
          format: double
        transactionCount:
          type: integer
      required: [dateFrom, dateTo, totalIncome, totalExpense, net, transactionCount]

    HouseholdAccountBalanceChartAccountMeta:
      type: object
      description: Per-account chart metadata and live balance (same staleness semantics as balance history).
      properties:
        accountId:
          type: string
        staleHistory:
          type: boolean
        historyRecalcFrom:
          type: [string, "null"]
          format: date
        currentBalance:
          type: number
          format: double
      required: [accountId, staleHistory, currentBalance]

    HouseholdAccountBalanceChartResponse:
      type: object
      description: |
        **Daily** balance series for dashboard charts. Query `dateFrom` / `dateTo` are UTC Zulu instants; the
        chart spans every UTC calendar day from the UTC date of `dateFrom` through the UTC date of `dateTo`
        (inclusive). Response fields `dateFrom` / `dateTo` echo those query instants as timestamps.

        `dates` has one ISO calendar date per day in that range (in order). `series` maps each account id to
        an array of balances with the same length as `dates`.

        For each account and day **D**, the value is the **latest snapshot balance** with `snapshot.date <= D`
        (forward-filled across days with no snapshot row, producing flat chart segments). If there is no snapshot
        on or before **D**, the value is **`initialBalance`** until a snapshot applies.

        For the server's **current UTC calendar date** (`today`), values are **`currentBalance`** from live account
        state (same as list account balances), so the chart matches real-time balances even when today's snapshot
        row is missing. Days after `today` still appear when `dateTo` extends into the future; they forward-fill
        from the last known balance as of each day (typically flat after the last in-range snapshot).

        Optional query flag **`projectFromTransactions`**: when true, **pending** transactions whose UTC calendar
        `date` falls in the chart day range adjust balances from **`today`** forward (and include pending on
        **`today`**). **Effective** transactions are already reflected in snapshots and `currentBalance` and are
        not applied again. Chart days before **`today`** are unchanged.
      properties:
        householdId:
          type: string
        dateFrom:
          type: string
          format: date-time
        dateTo:
          type: string
          format: date-time
        dates:
          type: array
          items:
            type: string
            format: date
        series:
          type: object
          additionalProperties:
            type: array
            items:
              type: number
              format: double
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/HouseholdAccountBalanceChartAccountMeta'
      required: [householdId, dateFrom, dateTo, dates, series, accounts]

