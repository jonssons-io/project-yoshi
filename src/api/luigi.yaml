  # BILLS (Recurring Bills)
  # ─────────────────────────
  /bill-instances:
    get:
      operationId: listBillInstances
      summary: List bill instances with flexible filters
      tags: [Bills]
      parameters:
        - name: billId
          in: query
          schema:
            type: string
        - name: householdId
          in: query
          schema:
            type: string
        - name: transactionId
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
        - name: includeArchived
          in: query
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: List of bill instances with recurring bill details (empty list when no matches)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BillInstance'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'

  /bill-instances/summary:
    get:
      operationId: getBillInstancesSummary
      summary: Count bill instances by derived status bucket
      description: |
        Returns **`upcomingCount`**, **`handledCount`**, **`overdueCount`**, and **`paidCount`** using the same rules as
        `BillInstance.status` (`BillInstanceStatus`). Scoping matches **`GET /bill-instances`**: provide **`householdId`**
        and/or **`billId`** (at least one required). Optional **`accountId`** filters by the instance's account;
        **`budgetId`** includes instances whose parent bill targets that budget (top-level or via a bill split).
        **`dateFrom`** / **`dateTo`** filter by instance **`dueDate`** (inclusive), with the same parsing as the list endpoint.
      tags: [Bills]
      parameters:
        - name: householdId
          in: query
          schema:
            type: string
        - name: billId
          in: query
          schema:
            type: string
        - name: accountId
          in: query
          schema:
            type: string
        - name: budgetId
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
        - name: includeArchived
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Status bucket counts for matching bill instances
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillInstancesSummary'

  /households/{householdId}/bills:
    parameters:
      - $ref: '#/components/parameters/householdId'
    get:
      operationId: listBills
      summary: List recurring bills for a household
      tags: [Bills]
      parameters:
        - name: budgetId
          in: query
          schema:
            type: string
        - name: includeArchived
          in: query
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: List of recurring bills (empty list when no matches)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Bill'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      operationId: createBill
      summary: Create a new recurring bill (generates instances up to 2 months ahead)
      tags: [Bills]
      description: |
        Creates a recurring bill template and generates bill instances up to 2 months ahead.
        A daily cron job generates additional instances as needed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBillRequest'
      responses:
        '201':
          description: Created recurring bill
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bill'

  /bills/{billId}:
    parameters:
      - $ref: '#/components/parameters/billId'
    get:
      operationId: getBill
      summary: Get a recurring bill blueprint by ID
      tags: [Bills]
      description: |
        Returns the **Bill** template (blueprint), not a bill instance. Response shape matches list/create/update bill responses.
      responses:
        '200':
          description: Recurring bill blueprint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bill'
    patch:
      operationId: updateBill
      summary: Update a recurring bill (regenerates future unpaid instances on schedule change)
      tags: [Bills]
      description: |
        The `billId` here is the **Bill** ID (the template), not the instance ID.
        **`updateScope`** controls whether edits apply immediately (**ALL**) or are scheduled (**UPCOMING**). Schedule changes
        may delete and regenerate forward instances per server rules.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBillRequest'
      responses:
        '200':
          description: Updated recurring bill
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bill'
    delete:
      operationId: deleteBill
      summary: Delete a recurring bill and all its instances
      tags: [Bills]
      responses:
        '200':
          description: Deleted

  /bills/{billId}/revisions:
    parameters:
      - $ref: '#/components/parameters/billId'
    get:
      operationId: listBillRevisions
      summary: List revision history for a recurring bill blueprint
      tags: [Bills]
      description: |
        Returns blueprint-level revision entries (newest first). Edits applied only to bill instances are not included.
      responses:
        '200':
          description: Revision log for the bill blueprint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillRevisionsEnvelope'

  /bills/{billId}/revisions/{revisionId}:
    parameters:
      - $ref: '#/components/parameters/billId'
      - name: revisionId
        in: path
        required: true
        schema:
          type: string
    delete:
      operationId: deleteBillScheduledRevision
      summary: Cancel a pending scheduled bill blueprint revision
      tags: [Bills]
      description: |
        Only revisions with **`scheduled`** true (not yet applied to the blueprint) may be deleted.
      responses:
        '200':
          description: Removed
        '404':
          description: Bill or scheduled revision not found

  /bills/{billId}/archive:
    parameters:
      - $ref: '#/components/parameters/billId'
    patch:
      operationId: archiveBill
      summary: Archive or unarchive a recurring bill
      tags: [Bills]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArchiveBillRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bill'

  /bill-instances/{instanceId}:
    parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getBillInstance
      summary: Get a specific bill instance
      tags: [Bills]
      responses:
        '200':
          description: Bill instance details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillInstance'
    patch:
      operationId: updateBillInstance
      summary: Update a single bill instance
      tags: [Bills]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBillInstanceRequest'
      responses:
        '200':
          description: Updated bill instance(s)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillInstance'

  # ─────────────────────────
  # INCOME
  # ─────────────────────────
  /households/{householdId}/incomes:
    parameters:
      - $ref: '#/components/parameters/householdId'
    get:
      operationId: listIncomes
      summary: List recurring income sources for a household
      tags: [Income]
      parameters:
        - name: includeArchived
          in: query
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: List of income sources (empty list when no matches)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Income'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
        '404':
          description: Household not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      operationId: createIncome
      summary: Create a new income source
      tags: [Income]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIncomeRequest'
      responses:
        '201':
          description: Created income
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Income'

  /households/{householdId}/income-sources:
    parameters:
      - $ref: '#/components/parameters/householdId'
    get:
      operationId: listIncomeSources
      summary: List income sources for a household
      tags: [IncomeSources]
      parameters:
        - name: includeArchived
          in: query
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: List of income sources (empty list when no matches)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/IncomeSource'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
        '404':
          description: Household not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /incomes/{incomeId}:
    parameters:
      - $ref: '#/components/parameters/incomeId'
    get:
      operationId: getIncome
      summary: Get an income source by ID
      tags: [Income]
      responses:
        '200':
          description: Income details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Income'
    patch:
      operationId: updateIncome
      summary: Update an income source
      tags: [Income]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIncomeRequest'
      responses:
        '200':
          description: Updated income
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Income'
    delete:
      operationId: deleteIncome
      summary: Delete an income source
      tags: [Income]
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /income-sources/{incomeSourceId}/archive:
    parameters:
      - $ref: '#/components/parameters/incomeSourceId'
    patch:
      operationId: archiveIncomeSource
      summary: Archive or unarchive an income source
      tags: [IncomeSources]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArchiveIncomeSourceRequest'
      responses:
        '200':
          description: Updated income source
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncomeSource'

  /incomes/{incomeId}/archive:
    parameters:
      - $ref: '#/components/parameters/incomeId'
    patch:
      operationId: archiveIncome
      summary: Archive or unarchive an income source
      tags: [Income]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArchiveIncomeRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Income'

  /incomes/{incomeId}/revisions:
    parameters:
      - $ref: '#/components/parameters/incomeId'
    get:
      operationId: listIncomeRevisions
      summary: List revision history for a recurring income blueprint
      tags: [Income]
      description: |
        Returns blueprint-level revision entries (newest first). Edits applied only to income instances are not included.
      responses:
        '200':
          description: Revision log for the income blueprint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncomeRevisionsEnvelope'

  /incomes/{incomeId}/revisions/{revisionId}:
    parameters:
      - $ref: '#/components/parameters/incomeId'
      - name: revisionId
        in: path
        required: true
        schema:
          type: string
    delete:
      operationId: deleteIncomeScheduledRevision
      summary: Cancel a pending scheduled income blueprint revision
      tags: [Income]
      description: |
        Only revisions with **`scheduled`** true (not yet applied to the blueprint) may be deleted.
      responses:
        '200':
          description: Removed
        '404':
          description: Income or scheduled revision not found

  /incomes/{incomeId}/instances:
    parameters:
      - $ref: '#/components/parameters/incomeId'
    get:
      operationId: listIncomeInstances
      summary: List income instances for an income blueprint
      tags: [Income]
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: List of income instances
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/IncomeInstance'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'

  /income-instances:
    get:
      operationId: listIncomeInstancesFiltered
      summary: List income instances with flexible filters
      tags: [Income]
      parameters:
        - name: incomeId
          in: query
          schema:
            type: string
        - name: householdId
          in: query
          schema:
            type: string
        - name: transactionId
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
        - name: includeArchived
          in: query
          schema:
            type: boolean
            default: false
        - name: accountId
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: List of income instances (empty list when no matches)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/IncomeInstance'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'

  /income-instances/summary:
    get:
      operationId: getIncomeInstancesSummary
      summary: Count income instances by derived status bucket
      description: |
        Returns **`upcomingCount`**, **`handledCount`**, **`overdueCount`**, and **`receivedCount`** using the same rules as
        `IncomeInstance.status` (`IncomeInstanceStatus`). Scoping matches **`GET /income-instances`**: provide **`householdId`**
        and/or **`incomeId`** (at least one required). Optional **`accountId`** filters by the instance's account;
        **`categoryId`** filters by the instance's category. **`dateFrom`** / **`dateTo`** filter by instance **`expectedDate`**
        (inclusive), with the same parsing as the list endpoint.
      tags: [Income]
      parameters:
        - name: householdId
          in: query
          schema:
            type: string
        - name: incomeId
          in: query
          schema:
            type: string
        - name: accountId
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
        - name: includeArchived
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Status bucket counts for matching income instances
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncomeInstancesSummary'

  /income-instances/{instanceId}:
    parameters:
      - name: instanceId
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getIncomeInstance
      summary: Get an income instance by ID
      tags: [Income]
      responses:
        '200':
          description: Income instance details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncomeInstance'
    patch:
      operationId: updateIncomeInstance
      summary: Update an income instance (including handled/received), optionally applying to other instances
      tags: [Income]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIncomeInstanceRequest'
      responses:
        '200':
          description: Updated income instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncomeInstance'

  # ─────────────────────────
  # RECIPIENTS
  # ─────────────────────────
  /households/{householdId}/recipients:
    parameters:
      - $ref: '#/components/parameters/householdId'
    get:
      operationId: listRecipients
      summary: List recipients for a household
      tags: [Recipients]
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: List of recipients (empty list when no matches)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Recipient'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
        '404':
          description: Household not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      operationId: createRecipient
      summary: Create a new recipient (fails if name already exists)
      tags: [Recipients]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecipientRequest'
      responses:
        '201':
          description: Created recipient
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipient'
        '409':
          description: Recipient with this name already exists
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /households/{householdId}/recipients/get-or-create:
    parameters:
      - $ref: '#/components/parameters/householdId'
    post:
      operationId: getOrCreateRecipient
      summary: Get existing or create new recipient by name
      tags: [Recipients]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetOrCreateRecipientRequest'
      responses:
        '200':
          description: Existing or newly created recipient
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipient'

  /recipients/{recipientId}:
    parameters:
      - $ref: '#/components/parameters/recipientId'
    get:
      operationId: getRecipient
      summary: Get a recipient by ID
      tags: [Recipients]
      responses:
        '200':
          description: Recipient details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipient'
    patch:
      operationId: updateRecipient
      summary: Update a recipient
      tags: [Recipients]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRecipientRequest'
      responses:
        '200':
          description: Updated recipient
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipient'
        '409':
          description: Recipient with this name already exists
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    delete:
      operationId: deleteRecipient
      summary: Delete a recipient
      tags: [Recipients]
      responses:
        '200':
          description: Deleted

  /recipients/{recipientId}/archive:
    parameters:
      - $ref: '#/components/parameters/recipientId'
    patch:
      operationId: archiveRecipient
      summary: Archive or unarchive a recipient
      tags: [Recipients]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArchiveRecipientRequest'
      responses:
        '200':
          description: Updated recipient
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipient'

  # ─────────────────────────
  # INVITATIONS
  # ─────────────────────────
  /invitations:
    get:
      operationId: listMyInvitations
      summary: List pending invitations for the authenticated user (by email via Clerk)
      tags: [Invitations]
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: List of pending invitations (empty list when no matches)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invitation'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'

  /households/{householdId}/invitations:
    parameters:
      - $ref: '#/components/parameters/householdId'
    get:
      operationId: listHouseholdInvitations
      summary: List pending invitations for a household
      tags: [Invitations]
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: List of pending invitations (empty list when no matches)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invitation'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
        '404':
          description: Household not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      operationId: createInvitation
      summary: Invite a user to a household by email
      tags: [Invitations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvitationRequest'
      responses:
        '201':
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
        '409':
          description: Invitation already pending for this email
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /invitations/{invitationId}/accept:
    parameters:
      - $ref: '#/components/parameters/invitationId'
    post:
      operationId: acceptInvitation
      summary: Accept an invitation (adds user to household)
      tags: [Invitations]
      responses:
        '200':
          description: Invitation accepted

  /invitations/{invitationId}/decline:
    parameters:
      - $ref: '#/components/parameters/invitationId'
    post:
      operationId: declineInvitation
      summary: Decline an invitation
      tags: [Invitations]
      responses:
        '200':
          description: Invitation declined

  /invitations/{invitationId}:
    parameters:
      - $ref: '#/components/parameters/invitationId'
    delete:
      operationId: revokeInvitation
      summary: Revoke a pending invitation (by a household member)
      tags: [Invitations]
      responses:
        '200':
          description: Invitation revoked

tags:
  - name: Households
    description: Manage households and membership
  - name: Accounts
    description: Financial accounts (bank, cash, etc.)
  - name: Budgets
    description: Spending plans with linked categories and accounts
  - name: Categories
    description: Income/Expense categories
  - name: Allocations
    description: Budget fund allocations and transfers
  - name: Transactions
    description: Income and expense entries
  - name: Bills
    description: Recurring bills and bill instances
  - name: Income
    description: Recurring income source definitions
  - name: IncomeSources
    description: Income sources and archiving
  - name: Recipients
    description: Payees and payers
  - name: Invitations
    description: Household invitation management
