          format: date-time
          description: Required when **`updateScope`** is **UPCOMING**; must be omitted when **ALL**.
        name:
          type: string
        recipientId:
          type: string
        newRecipientName:
          type: string
          minLength: 1
        accountId:
          type: string
        budgetId:
          type: [string, "null"]
          description: Must be null when `splits` is non-empty.
        dueDate:
          type: string
          format: date-time
          description: Timezone-aware instant; prefer UTC (`Z`), or offset local start-of-day if needed (see `BillInstance.dueDate`).
        recurrenceType:
          $ref: '#/components/schemas/RecurrenceType'
        customIntervalDays:
          type: integer
          minimum: 1
        estimatedAmount:
          type: number
          format: double
          exclusiveMinimum: 0
        endDate:
          type: [string, "null"]
          format: date-time
        lastPaymentDate:
          type: [string, "null"]
          format: date-time
        paymentHandling:
          anyOf:
            - $ref: '#/components/schemas/BillPaymentHandling'
            - type: "null"
          description: Set or clear payment handling; omit to leave unchanged.
        categoryId:
          type: [string, "null"]
          description: Must be null when the bill has non-empty `splits` (after this update).
        archived:
          type: boolean
        splits:
          type: array
          description: When present and non-empty, top-level `budgetId` and top-level `categoryId` must be null.
          items:
            $ref: '#/components/schemas/BillSplitWrite'
      required: [updateScope]
    ArchiveBillRequest:
      type: object
      properties:
        archived:
          type: boolean
      required: [archived]
    UpdateBillInstanceRequest:
      type: object
      description: |
        Updates **only** the targeted bill instance (never other occurrences).

        **`recipient`** vs **`newRecipientName`**: mutually exclusive — send at most one. When **`newRecipientName`** is set,
        the server get-or-creates a recipient in the household (same as create bill).

        **`categoryId`** vs **`newCategoryName`**: mutually exclusive when used. Neither may be sent when the instance
        effectively has split lines: non-empty **`splits`** in this request, existing per-instance split lines, or the parent
        bill has blueprint split lines.

        **`budgetId`** and **`splits`**: if **`splits`** is non-empty, **`budgetId`** must be null (each split line may carry
        its own **`budgetId`**). When **`splits`** is present and empty, per-instance split overrides are removed and the
        instance **`categoryId`** / **`budgetId`** are reset from the current parent bill.

        **`paymentHandling`**: omit to leave the instance override unchanged; send **`null`** to clear the override (inherit
        from the parent bill); send an enum value to set an instance-specific override.
      properties:
        name:
          type: string
        recipient:
          type: string
          description: Existing recipient id; omit when using **`newRecipientName`**.
        newRecipientName:
          type: string
          minLength: 1
          description: Get-or-create recipient by name; omit when using **`recipient`**.
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
        dueDate:
          type: string
          format: date-time
          description: Timezone-aware instant; prefer UTC (`Z`), or offset local start-of-day if needed (see `BillInstance.dueDate`).
        accountId:
          type: string
        budgetId:
          type: [string, "null"]
          description: Used when there are no split lines on the instance. Must be null when **`splits`** is non-empty.
        categoryId:
          type: string
          description: Must be omitted when **`newCategoryName`** is set or when split lines apply.
        newCategoryName:
          type: string
          minLength: 1
          description: Create a new **EXPENSE** category by name; omit when **`categoryId`** is set.
        paymentHandling:
          anyOf:
            - $ref: '#/components/schemas/BillPaymentHandling'
            - type: "null"
          description: Set, clear, or leave unchanged; see schema description above.
        splits:
          type: array
          description: |
            When present and non-empty, top-level **`budgetId`** and top-level category fields must be unset.
            When present and **empty**, per-instance split overrides are removed and **`categoryId`** / **`budgetId`** are reset
            from the parent bill; do not send top-level **`categoryId`**, **`newCategoryName`**, or **`budgetId`** in the same request.
          items:
            $ref: '#/components/schemas/BillSplitWrite'
    UpdateIncomeInstanceRequest:
      type: object
      description: |
        Updates **only** the targeted income instance (never other occurrences).
        `categoryId` vs `newCategoryName`, and `incomeSourceId` vs `newIncomeSourceName`, are mutually exclusive: send at most
        one from each pair. When `newCategoryName` is set, the server creates an **INCOME** category and links it to **all**
        budgets in the household (same default linking as `CreateCategoryRequest` with `budgetIds` omitted).
      properties:
        name:
          type: string
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
        expectedDate:
          type: string
          format: date-time
          description: Timezone-aware instant; prefer UTC (`Z`), or offset local start-of-day if needed (see `IncomeInstance.expectedDate`).
        accountId:
          type: string
        categoryId:
          type: string
          description: Must be omitted when `newCategoryName` is set.
        newCategoryName:
          type: string
          minLength: 1
          description: Create a new **INCOME** category by name; must be omitted when `categoryId` is set.
        incomeSourceId:
          type: string
          description: Must be omitted when `newIncomeSourceName` is set.
        newIncomeSourceName:
          type: string
          minLength: 1
          description: Get-or-create an income source by name in the household; must be omitted when `incomeSourceId` is set.
    CreateTransferRequest:
      type: object
      properties:
        fromAccountId:
          type: string
        toAccountId:
          type: string
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
        date:
          type: string
          format: date-time
        notes:
          type: string
      required: [fromAccountId, toAccountId, amount, date]
    UpdateTransferRequest:
      type: object
      properties:
        fromAccountId:
          type: string
        toAccountId:
          type: string
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
        date:
          type: string
          format: date-time
        notes:
          type: [string, "null"]
    CreateIncomeRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        incomeSourceId:
          type: string
        newIncomeSourceName:
          type: string
          minLength: 1
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
        expectedDate:
          type: string
          format: date-time
          description: Timezone-aware instant; prefer UTC (`Z`), or offset local start-of-day if needed (see `IncomeInstance.expectedDate`).
        accountId:
          type: string
        categoryId:
          type: string
        newCategoryName:
          type: string
        recurrenceType:
          $ref: '#/components/schemas/RecurrenceType'
        customIntervalDays:
          type: [integer, "null"]
        endDate:
          type: [string, "null"]
          format: date-time
      required: [name, amount, expectedDate, accountId, recurrenceType]
    UpdateIncomeRequest:
      type: object
      description: |
        **`updateScope`**: **ALL** applies immediately (omit **`fromDate`**; do not send **`recurrenceType`** or **`customIntervalDays`**).
        **UPCOMING** requires **`fromDate`** and schedules changes without updating the blueprint row until they mature.
      properties:
        updateScope:
          $ref: '#/components/schemas/BlueprintPatchScope'
        fromDate:
          type: string
          format: date-time
          description: Required when **`updateScope`** is **UPCOMING**; must be omitted when **ALL**.
        name:
          type: string
          minLength: 1
        incomeSourceId:
          type: string
        newIncomeSourceName:
          type: string
          minLength: 1
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
        expectedDate:
          type: string
          format: date-time
          description: Timezone-aware instant; prefer UTC (`Z`), or offset local start-of-day if needed (see `IncomeInstance.expectedDate`).
        accountId:
          type: string
        categoryId:
          type: string
        newCategoryName:
          type: string
        recurrenceType:
          $ref: '#/components/schemas/RecurrenceType'
        customIntervalDays:
          type: [integer, "null"]
        endDate:
          type: [string, "null"]
          format: date-time
      required: [updateScope]
    ArchiveIncomeRequest:
      type: object
      properties:
        archived:
          type: boolean
      required: [archived]
    ArchiveCategoryRequest:
      type: object
      properties:
        archived:
          type: boolean
      required: [archived]
    ArchiveRecipientRequest:
      type: object
      properties:
        archived:
          type: boolean
      required: [archived]
    ArchiveIncomeSourceRequest:
      type: object
      properties:
        archived:
          type: boolean
      required: [archived]
    CreateRecipientRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
      required: [name]
    GetOrCreateRecipientRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
      required: [name]
    UpdateRecipientRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
    CreateInvitationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [email]

  # ───────── Reusable Parameters ─────────
  parameters:
    householdId:
      name: householdId
      in: path
      required: true
      schema:
        type: string
    budgetId:
      name: budgetId
      in: path
      required: true
      schema:
        type: string
    accountId:
      name: accountId
      in: path
      required: true
      schema:
        type: string
    categoryId:
      name: categoryId
      in: path
      required: true
      schema:
        type: string
    transactionId:
      name: transactionId
      in: path
      required: true
      schema:
        type: string
    recipientId:
      name: recipientId
      in: path
      required: true
      schema:
        type: string
    incomeId:
      name: incomeId
      in: path
      required: true
      schema:
        type: string
    incomeSourceId:
      name: incomeSourceId
      in: path
      required: true
      schema:
        type: string
    billId:
      name: billId
      in: path
      required: true
      schema:
        type: string
    invitationId:
      name: invitationId
      in: path
      required: true
      schema:
        type: string
    limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        maximum: 100
      description: Maximum number of items to return. Omit to return all items. Set to 0 to return only the pagination count metadata (no data items).
    offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
      description: Number of items to skip

# ═══════════════════════════════════════════════
# Paths
# ═══════════════════════════════════════════════
paths:
  # ─────────────────────────
  # HOUSEHOLDS
  # ─────────────────────────
  /households:
    get:
      operationId: listHouseholds
      summary: List all households for the authenticated user, along with the default household ID.
      tags: [Households]
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: List of households (empty list when no matches)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Household'
                  defaultHouseholdId:
                    type: [string, "null"]
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      operationId: createHousehold
      summary: Create a new household
      tags: [Households]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHouseholdRequest'
      responses:
        '201':
          description: Created household
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Household'

  /households/{householdId}:
    parameters:
      - $ref: '#/components/parameters/householdId'
    get:
      operationId: getHousehold
      summary: Get a specific household
      tags: [Households]
      responses:
        '200':
          description: Household details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Household'
        '404':
          description: Household not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    patch:
      operationId: updateHousehold
      summary: Update a household
      tags: [Households]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHouseholdRequest'
      responses:
        '200':
          description: Updated household
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Household'
    delete:
      operationId: deleteHousehold
      summary: Delete a household
      tags: [Households]
      responses:
        '200':
          description: Deleted household
  /households/{householdId}/members:
    parameters:
      - $ref: '#/components/parameters/householdId'
    get:
      operationId: getHouseholdMembers
      summary: Get household members with user details (from Clerk)
      tags: [Households]
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: List of household members
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/HouseholdMember'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'

  /households/{householdId}/members/{userId}:
    parameters:
      - $ref: '#/components/parameters/householdId'
      - name: userId
        in: path
        required: true
        schema:
          type: string
    put:
      operationId: addHouseholdMember
      summary: Add a user to a household
      tags: [Households]
      responses:
        '201':
          description: User added
        '409':
          description: User already a member
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    delete:
      operationId: removeHouseholdMember
      summary: Remove a user from a household
      tags: [Households]
      responses:
        '200':
          description: User removed
        '412':
          description: Cannot remove last user
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /user-settings/default-household:
    put:
      operationId: setDefaultHousehold
      summary: Set the default household for the authenticated user
      tags: [UserSettings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetDefaultHouseholdRequest'
      responses:
        '200':
          description: Default household updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          description: User is not a member of the household
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Household not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  # ─────────────────────────
  # ACCOUNTS
  # ─────────────────────────
  /households/{householdId}/accounts:
    parameters:
      - $ref: '#/components/parameters/householdId'
    get:
      operationId: listAccounts
      summary: List accounts for a household
      tags: [Accounts]
      parameters:
        - name: budgetId
          in: query
          schema:
            type: string
          description: Filter by budget linkage
        - name: excludeArchived
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: List of accounts (empty list when no matches)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccountWithBalance'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
        '404':
          description: Household not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      operationId: createAccount
      summary: Create a new account
      tags: [Accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        '201':
          description: Created account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'

  /accounts/{accountId}:
    parameters:
      - $ref: '#/components/parameters/accountId'
    get:
      operationId: getAccount
      summary: Get account by ID
      tags: [Accounts]
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDetail'
    patch:
      operationId: updateAccount
      summary: Update an account
      tags: [Accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountRequest'
      responses:
        '200':
          description: Updated account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
    delete:
      operationId: deleteAccount
      summary: Delete an account (must have no transactions, bills, or transfers)
      tags: [Accounts]
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '412':
          description: Account has linked records
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /accounts/{accountId}/balance:
    parameters:
      - $ref: '#/components/parameters/accountId'
    get:
      operationId: getAccountBalance
      summary: Get current balance for an account
      description: |
        Returns the live current balance updated synchronously on transaction mutations.
        Includes `staleHistory` and `historyRecalcFrom` when snapshot history is being rebuilt.
      tags: [Accounts]
      responses:
        '200':
          description: Account balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBalance'

  /accounts/{accountId}/balance-history:
    parameters:
      - $ref: '#/components/parameters/accountId'
    get:
      operationId: getAccountBalanceHistory
      summary: Get historical balance snapshots for an account
      description: |
        Daily snapshot history for an account. Optional `dateFrom` / `dateTo` are UTC Zulu instants; each is
        mapped to its UTC calendar date to filter `snapshot.date`. If `staleHistory` is true, any dates on or after
        `historyRecalcFrom` should be treated as provisional until the async rebuild completes.
      tags: [Accounts]
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: Paginated list of account balance snapshots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBalanceHistory'

  /accounts/balance-history:
    get:
      operationId: getMultiAccountBalanceHistory
      summary: Get balance snapshots for multiple accounts
      description: |
        Batch snapshot history for multiple accounts, including staleness flags per account. Optional `dateFrom` /
        `dateTo` are UTC Zulu instants mapped to UTC calendar dates for `snapshot.date` filtering.
      tags: [Accounts]
      parameters:
        - name: accountIds
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Balance history for multiple accounts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBalanceHistoryResponse'

  /households/{householdId}/account-balances:
    parameters:
      - $ref: '#/components/parameters/householdId'
    get:
      operationId: listAccountBalances
      summary: List current balances for accounts in a household
      description: |
        Returns live balances for accounts in a household in a single request.
      tags: [Accounts]
      parameters:
        - name: accountIds
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
        - name: includeArchived
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: List of account balances
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBalanceListResponse'

  /accounts/{accountId}/archive:
    parameters:
      - $ref: '#/components/parameters/accountId'
    patch:
      operationId: toggleAccountArchive
      summary: Toggle archive status of an account
      tags: [Accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToggleAccountArchiveRequest'
      responses:
        '200':
          description: Updated account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'

  # ─────────────────────────
  # BUDGETS
  # ─────────────────────────
  /households/{householdId}/budgets:
    parameters:
      - $ref: '#/components/parameters/householdId'
    get:
      operationId: listBudgets
      summary: List all budgets for a household (with computed totals)
      tags: [Budgets]
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: List of budgets with allocated/spent/remaining amounts (empty list when no matches)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BudgetWithMetrics'
                  defaultBudgetId:
                    type: [string, "null"]
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
        '404':
          description: Household not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      operationId: createBudget
      summary: Create a new budget
      tags: [Budgets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBudgetRequest'
      responses:
        '201':
          description: Created budget
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetWithMetrics'

  /user-settings/default-budget:
    put:
      operationId: setDefaultBudget
      summary: Set the default budget for the authenticated user in a household
      tags: [UserSettings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetDefaultBudgetRequest'
      responses:
        '200':
          description: Default budget updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: Budget or household not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /budgets/{budgetId}:
    parameters:
      - $ref: '#/components/parameters/budgetId'
    get:
      operationId: getBudget
      summary: Get a specific budget with related details
      tags: [Budgets]
      responses:
        '200':
          description: Budget details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetWithMetrics'
    patch:
      operationId: updateBudget
      summary: Update a budget
      tags: [Budgets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBudgetRequest'
      responses:
        '200':
          description: Updated budget
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetWithMetrics'
    delete:
      operationId: deleteBudget
      summary: Delete a budget (clears budgetId on transactions and bills)
      tags: [Budgets]
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /budgets/{budgetId}/snapshot-history:
    parameters:
      - $ref: '#/components/parameters/budgetId'
    get:
      operationId: getBudgetSnapshotHistory
      summary: Get historical snapshots for a budget
      description: |
        Optional `dateFrom` / `dateTo` are UTC Zulu instants mapped to UTC calendar dates for `snapshot.date`
        filtering.
      tags: [Budgets]
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
