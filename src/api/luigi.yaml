    SplitInlineNewCategory:
      type: object
      description: |
        Inline category for a transaction split. If `type` is omitted, the server uses the category kind implied by the
        parent transaction (`EXPENSE` → expense category, `INCOME` → income category). If `type` is provided, it must
        match that implied kind.
      properties:
        name:
          type: string
          minLength: 1
        type:
          $ref: '#/components/schemas/CategoryType'
      required: [name]
    TransactionSplitWrite:
      type: object
      description: |
        Set exactly one of `categoryId`, `newCategoryName`, or `newCategory` to assign a category to the split line.
        For effective `EXPENSE` transactions with splits, each line must include `budgetId` (envelope) for that split amount.
      properties:
        categoryId:
          type: string
        newCategoryName:
          type: string
          minLength: 1
        newCategory:
          $ref: '#/components/schemas/SplitInlineNewCategory'
        budgetId:
          type: string
          description: Required for each split when the parent transaction is an effective expense with splits.
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
        subtitle:
          type: string
      required: [amount, subtitle]
    CreateTransactionRequest:
      type: object
      description: |
        `budgetId` and `splits` are mutually exclusive: if `splits` is non-empty, `budgetId` must be null and each split
        line carries its own `budgetId` for effective expenses.
        Top-level `categoryId` / `newCategory` and `splits` are mutually exclusive: if `splits` is non-empty, omit
        top-level category fields; each split line carries its own category.
      properties:
        type:
          $ref: '#/components/schemas/TransactionType'
        budgetId:
          type: [string, "null"]
          description: Used when there are no splits. Must be null when `splits` is non-empty.
        accountId:
          type: string
        categoryId:
          type: [string, "null"]
        transferToAccountId:
          type: [string, "null"]
        instanceId:
          type: [string, "null"]
          description: |
            When set, links this transaction to one occurrence: **bill instance** id if `type` is `EXPENSE`, **income instance**
            id if `type` is `INCOME`. Must belong to the same household as `accountId`. Omit for `TRANSFER` and for unlinked
            transactions. See operation description for validation and side effects (stores `transactionId` on the instance;
            derived `status` on instance responses reflects the link and due/expected instant vs UTC now).
        newCategory:
          type: object
          properties:
            name:
              type: string
              minLength: 1
            type:
              $ref: '#/components/schemas/CategoryType'
          required: [name, type]
        name:
          type: string
          minLength: 1
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
        date:
          type: string
          format: date-time
        notes:
          type: [string, "null"]
        recipientId:
          type: [string, "null"]
        newRecipientName:
          type: string
          minLength: 1
        incomeSourceId:
          type: [string, "null"]
          description: |
            When `type` is `INCOME`, links the transaction to an existing income source (payer). Ignored for other types.
        newIncomeSourceName:
          type: string
          minLength: 1
          description: |
            When `type` is `INCOME` and `incomeSourceId` is not set, get-or-create an income source by name in the household.
            Ignored for other types.
        splits:
          type: array
          description: When present and non-empty, top-level `budgetId` and top-level category fields must be unset.
          items:
            $ref: '#/components/schemas/TransactionSplitWrite'
      required: [accountId, name, amount, date]
    UpdateTransactionRequest:
      type: object
      description: |
        `budgetId` and `splits` are mutually exclusive: if `splits` is non-empty, `budgetId` must be null.
        Top-level `categoryId` and `splits` are mutually exclusive: if `splits` is non-empty (after the update),
        `categoryId` must be null.
      properties:
        type:
          $ref: '#/components/schemas/TransactionType'
        accountId:
          type: string
        budgetId:
          type: [string, "null"]
          description: Must be null when `splits` is non-empty.
        categoryId:
          type: [string, "null"]
          description: Must be null when the transaction has non-empty `splits` (after this update).
        transferToAccountId:
          type: [string, "null"]
        instanceId:
          type: [string, "null"]
          description: |
            Set or clear (`null`) the linked bill or income instance. Same rules as create: **bill instance** for `EXPENSE`,
            **income instance** for `INCOME`; must match `type` and household. Changing `type` or clearing the link updates
            the stored link on the instance when applicable (derived `status` is computed on read). Not valid when `type` is `TRANSFER`.
        name:
          type: string
          minLength: 1
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
        date:
          type: string
          format: date-time
        notes:
          type: [string, "null"]
        recipientId:
          type: [string, "null"]
        incomeSourceId:
          type: [string, "null"]
          description: When `type` is `INCOME`, set or clear the linked income source. Ignored for other types.
        splits:
          type: array
          description: When present and non-empty, top-level `budgetId` and top-level `categoryId` must be null.
          items:
            $ref: '#/components/schemas/TransactionSplitWrite'
    CloneTransactionRequest:
      type: object
      properties:
        date:
          type: string
          format: date-time
    CreateBillRequest:
      type: object
      description: |
        `budgetId` and `splits` are mutually exclusive: if `splits` is non-empty, `budgetId` must be null and each split
        may carry its own `budgetId`.
        Top-level `categoryId` / `newCategoryName` and `splits` are mutually exclusive: if `splits` is non-empty, omit
