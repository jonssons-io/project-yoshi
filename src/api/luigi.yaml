openapi: 3.1.0
info:
  title: Project Luigi API
  description: |
    Household budgeting and finance management API.
    Extracted from the existing tRPC-based implementation for migration to a standalone REST backend with PostgreSQL.

    ## Authentication
    All endpoints (except where noted) require a valid Bearer token (Clerk JWT).
    The authenticated user's ID is derived from the token — it is **no longer passed in the request body**.

    ## Key Concepts
    - **Household** — Top-level unit. Users, accounts, budgets, and categories are scoped to a household.
    - **Budget** — A spending plan linked to categories and accounts via many-to-many join tables.
    - **Account** — A financial account (bank, cash, etc.) with an initial balance.
    - **Category** — Tagged as INCOME, EXPENSE, or both. Linked to budgets.
    - **Transaction** — An income or expense entry tied to an account and optionally a budget.
    - **Transfer** — Moves funds between two accounts within the same budget.
    - **Bill / Bill** — A bill template and its generated instances.
    - **Income** — A recurring income source definition.
    - **Recipient** — A payee or payer, scoped to a household.
    - **Invitation** — Email-based invite to join a household.
    - **Allocation** — Funds allocated (or transferred) between budgets.

    ## Snapshot Architecture
    - **Current balances** are updated synchronously on every transaction create/update/delete.
    - **Daily snapshots** are written once per day for all accounts and budgets.
    - **Backdated changes** mark account history as stale and trigger targeted async snapshot rebuilds.

    Clients should treat any snapshot dates **on or after** `historyRecalcFrom` as provisional while `staleHistory` is true.

    ## Pagination
    List endpoints support optional `limit` and `offset` (default 0) query parameters. If `limit` is **omitted**, the full dataset is returned. If provided, `limit` must be between 0 and 100: use `limit=0` to fetch only the total count in the pagination metadata; use 1–100 to cap the number of items. Responses include pagination metadata.

    ## Dates and timestamps
    - **Dates** (`format: date`, `YYYY-MM-DD`) are plain calendar dates. Where a range must cover full UTC days, the server expands them to inclusive UTC bounds (`00:00:00.000Z` on the start date through `23:59:59.999Z` on the end date) unless an operation documents otherwise.
    - **Timestamps** (`format: date-time`) must be ISO 8601 instants in **UTC** with a **`Z`** suffix (for example `2024-06-01T12:00:00.000Z`). Numeric offsets such as `+00:00` are not accepted on input.
    - **Responses** serialize timestamps with a `Z` suffix and three fractional digits.

    ## Empty List Behavior
    List endpoints always return `200` with an empty `data` array when no matches are found. `404` is reserved for missing parent resources (for example, an unknown `householdId` or `budgetId`).
  version: 1.0.0
  contact:
    name: Project Yoshi

servers:
  - url: /api/v1
    description: API v1

# ─────────────────────────────────────────────
# Security
# ─────────────────────────────────────────────
security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ───────── Enums ─────────
  schemas:
    CategoryType:
      type: string
      enum: [INCOME, EXPENSE]

    RecurrenceType:
      type: string
      enum: [NONE, WEEKLY, MONTHLY, QUARTERLY, YEARLY, CUSTOM]

    InvitationStatus:
      type: string
      enum: [PENDING, ACCEPTED, DECLINED]

    RecipientScope:
      type: string
      enum: [BILL, TRANSACTION]
    TransactionType:
      type: string
      enum: [EXPENSE, INCOME, TRANSFER]
    TransactionStatus:
      type: string
      enum: [PENDING, EFFECTIVE]
    InstanceStatus:
      type: string
      enum: [UPCOMING, DUE, HANDLED]

    BillPaymentHandling:
      type: string
      description: |
        How the recurring bill is paid or delivered (Swedish UI “Hantering”): direct debit, e-invoice, mail, vendor portal, paper, etc.
      enum: [AUTOGIRO, E_INVOICE, MAIL, PORTAL, PAPER]

    # ───────── Core Models ─────────
    Household:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        _count:
          type: object
          properties:
            users:
              type: integer
            budgets:
              type: integer
            categories:
              type: integer
            accounts:
              type: integer
      required: [id, name, createdAt]

    HouseholdUser:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        householdId:
          type: string
        joinedAt:
          type: string
          format: date-time
      required: [id, userId, householdId, joinedAt]

    UserSettings:
      type: object
      properties:
        userId:
          type: string
        defaultHouseholdId:
          type: [string, "null"]
      required: [userId]

    UserHouseholdSettings:
      type: object
      properties:
        userId:
          type: string
        householdId:
          type: string
        defaultBudgetId:
          type: [string, "null"]
      required: [userId, householdId]

    HouseholdMember:
      allOf:
        - $ref: '#/components/schemas/HouseholdUser'
        - type: object
          properties:
            user:
              type: [object, "null"]
              properties:
                id:
                  type: string
                firstName:
                  type: [string, "null"]
                lastName:
                  type: [string, "null"]
                fullName:
                  type: [string, "null"]
                imageUrl:
                  type: [string, "null"]
                email:
                  type: [string, "null"]

    Account:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        externalIdentifier:
          type: [string, "null"]
        initialBalance:
          type: number
          format: double
        householdId:
          type: string
        archived:
          type: boolean
        createdAt:
          type: string
          format: date-time
        _count:
          type: object
          properties:
            transactions:
              type: integer
            budgets:
              type: integer
      required: [id, name, initialBalance, householdId, archived, createdAt]

    AccountDetail:
      allOf:
        - $ref: '#/components/schemas/Account'
        - type: object
          properties:
            budgets:
              type: array
              items:
                $ref: '#/components/schemas/Budget'
          required: [budgets]

    AccountWithBalance:
      allOf:
        - $ref: '#/components/schemas/Account'
        - type: object
          properties:
            currentBalance:
              type: number
              format: double
          required: [currentBalance]

    AccountBalance:
      type: object
      properties:
        account:
          $ref: '#/components/schemas/RelationRef'
        initialBalance:
          type: number
          format: double
        currentBalance:
          type: number
          format: double
        transactionCount:
          type: integer
        latestSnapshot:
          $ref: '#/components/schemas/AccountBalanceSnapshot'
        staleHistory:
          type: boolean
        historyRecalcFrom:
          type: [string, "null"]
          format: date
      required: [account, initialBalance, currentBalance, transactionCount, staleHistory]

    Budget:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        startDate:
          type: string
          format: date-time
        householdId:
          type: string
        createdAt:
          type: string
          format: date-time
        allocatedAmount:
          type: number
          format: double
        spentAmount:
          type: number
          format: double
        remainingAmount:
          type: number
          format: double
        _count:
          type: object
          properties:
            transactions:
              type: integer
            bills:
              type: integer
            categories:
              type: integer
            accounts:
              type: integer
      required: [id, name, startDate, householdId, createdAt]

    BudgetWithMetrics:
      allOf:
        - $ref: '#/components/schemas/Budget'
        - type: object
          properties:
            isOverdrafted:
              type: boolean
            overdraftAmount:
              type: number
              format: double
          required: [allocatedAmount, spentAmount, remainingAmount, isOverdrafted, overdraftAmount]

    BudgetDetail:
      allOf:
        - $ref: '#/components/schemas/BudgetWithMetrics'
        - type: object
          properties:
            household:
              $ref: '#/components/schemas/Household'
            categories:
              type: array
              items:
                type: object
                properties:
                  budgetId:
                    type: string
                  categoryId:
                    type: string
                  category:
                    $ref: '#/components/schemas/Category'
            accounts:
              type: array
              items:
                type: object
                properties:
                  budgetId:
                    type: string
                  accountId:
                    type: string
                  account:
                    $ref: '#/components/schemas/Account'

    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        types:
          type: array
          items:
            $ref: '#/components/schemas/CategoryType'
        householdId:
          type: string
        archived:
          type: boolean
        createdAt:
          type: string
          format: date-time
        _count:
          type: object
          properties:
            transactions:
              type: integer
            budgets:
              type: integer
      required: [id, name, types, householdId, archived, createdAt]

    CategoryDetail:
      allOf:
        - $ref: '#/components/schemas/Category'
        - type: object
          properties:
            budgets:
              type: array
              items:
                $ref: '#/components/schemas/Budget'
          required: [budgets]

    RelationRef:
      type: object
      properties:
        id:
          type: string
        name:
          type: [string, "null"]
      required: [id, name]

    NullableRelationRef:
      type: [object, "null"]
      properties:
        id:
          type: string
        name:
          type: [string, "null"]
      required: [id, name]

    Transaction:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        amount:
          type: number
          format: double
        date:
          type: string
          format: date-time
        type:
          $ref: '#/components/schemas/TransactionType'
        status:
          $ref: '#/components/schemas/TransactionStatus'
        notes:
          type: [string, "null"]
        household:
          $ref: '#/components/schemas/RelationRef'
        category:
          $ref: '#/components/schemas/NullableRelationRef'
        account:
          $ref: '#/components/schemas/RelationRef'
        transferToAccount:
          $ref: '#/components/schemas/NullableRelationRef'
        budget:
          $ref: '#/components/schemas/NullableRelationRef'
        billInstance:
          $ref: '#/components/schemas/NullableRelationRef'
        bill:
          $ref: '#/components/schemas/NullableRelationRef'
        incomeInstance:
          $ref: '#/components/schemas/NullableRelationRef'
        income:
          $ref: '#/components/schemas/NullableRelationRef'
        incomeSource:
          $ref: '#/components/schemas/NullableRelationRef'
        recipient:
          $ref: '#/components/schemas/NullableRelationRef'
        createdAt:
          type: string
          format: date-time
        splits:
          type: array
          items:
            $ref: '#/components/schemas/TransactionSplit'
      required: [id, name, amount, date, type, status, household, account, createdAt]

    TransactionSplit:
      type: object
      properties:
        id:
          type: string
        transactionId:
          type: string
        categoryId:
          type: string
        budgetId:
          type: [string, "null"]
        amount:
          type: number
          format: double
        subtitle:
          type: string
        category:
          $ref: '#/components/schemas/Category'
        budget:
          $ref: '#/components/schemas/NullableRelationRef'
      required: [id, transactionId, categoryId, amount, subtitle]

    TransactionGroupedByCategory:
      type: object
      properties:
        category:
          $ref: '#/components/schemas/Category'
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        total:
          type: number
          format: double
        count:
          type: integer
      required: [category, transactions, total, count]

    BillUpdateType:
      type: string
      enum: [INSTANCE, FUTURE, ALL]

    Bill:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        recipient:
          $ref: '#/components/schemas/RelationRef'
        account:
          $ref: '#/components/schemas/RelationRef'
        startDate:
          type: string
          format: date-time
        recurrenceType:
          $ref: '#/components/schemas/RecurrenceType'
        customIntervalDays:
          type: [integer, "null"]
        estimatedAmount:
          type: number
          format: double
        endDate:
          type: [string, "null"]
          format: date-time
        lastPaymentDate:
          type: [string, "null"]
          format: date-time
        paymentHandling:
          anyOf:
            - $ref: '#/components/schemas/BillPaymentHandling'
            - type: "null"
          description: How the bill is paid or received; null when unset (e.g. legacy bills).
        category:
          $ref: '#/components/schemas/NullableRelationRef'
        budget:
          $ref: '#/components/schemas/NullableRelationRef'
        household:
          $ref: '#/components/schemas/RelationRef'
        archived:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, name, recipient, account, startDate, recurrenceType, estimatedAmount, household, archived, createdAt]

    BillInstance:
      type: object
      description: A flattened view of a bill instance with its recurring bill details.
      properties:
        id:
          type: string
          description: Bill instance ID
        bill:
          $ref: '#/components/schemas/NullableRelationRef'
        name:
          type: string
        recipient:
          $ref: '#/components/schemas/RelationRef'
        amount:
          type: number
          format: double
        paidAmount:
          type: [number, "null"]
          format: double
        dueDate:
          type: string
          format: date-time
        budget:
          $ref: '#/components/schemas/NullableRelationRef'
        status:
          $ref: '#/components/schemas/InstanceStatus'
        transaction:
          $ref: '#/components/schemas/NullableRelationRef'
        account:
          $ref: '#/components/schemas/NullableRelationRef'
        category:
          $ref: '#/components/schemas/NullableRelationRef'
        splits:
          type: array
          items:
            $ref: '#/components/schemas/BillSplit'
        recurrenceType:
          $ref: '#/components/schemas/RecurrenceType'
        customIntervalDays:
          type: [integer, "null"]
        paymentHandling:
          anyOf:
            - $ref: '#/components/schemas/BillPaymentHandling'
            - type: "null"
          description: Copied from the parent recurring bill; null when the bill has no handling set or no parent bill.
        startDate:
          type: string
          format: date-time
        archived:
          type: boolean
      required: [id, name, recipient, amount, dueDate, status, recurrenceType, startDate, archived]

    BillSplit:
      type: object
      properties:
        id:
          type: string
        billId:
          type: [string, "null"]
        billInstanceId:
          type: [string, "null"]
        categoryId:
          type: string
        budgetId:
          type: [string, "null"]
        amount:
          type: number
          format: double
        subtitle:
          type: string
        categoryName:
          type: [string, "null"]
        category:
          $ref: '#/components/schemas/Category'
        budget:
          $ref: '#/components/schemas/NullableRelationRef'
      required: [id, categoryId, amount, subtitle]

    BillSplitWrite:
      type: object
      description: |
        Line item for bill splits. When `splits` is non-empty, top-level bill `budgetId` and top-level category fields
        must be unset; each line carries its own category and may reference a household budget via `budgetId`.
      properties:
        categoryId:
          type: string
        newCategoryName:
          type: string
          minLength: 1
        budgetId:
          type: string
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
        subtitle:
          type: string
      required: [amount, subtitle]

    IncomeInstance:
      type: object
      properties:
        id:
          type: string
        incomeId:
          type: [string, "null"]
        name:
          type: string
        incomeSourceId:
          type: string
        amount:
          type: number
          format: double
        expectedDate:
          type: string
          format: date-time
        accountId:
          type: string
        categoryId:
          type: [string, "null"]
        status:
          $ref: '#/components/schemas/InstanceStatus'
        transactionId:
          type: [string, "null"]
        householdId:
          type: string
      required: [id, name, incomeSourceId, amount, expectedDate, accountId, status, householdId]

    Income:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        incomeSourceId:
          type: string
        accountId:
          type: string
        expectedDate:
          type: string
          format: date-time
        recurrenceType:
          $ref: '#/components/schemas/RecurrenceType'
        customIntervalDays:
          type: [integer, "null"]
        estimatedAmount:
          type: number
          format: double
        endDate:
          type: [string, "null"]
          format: date-time
        categoryId:
          type: string
        householdId:
          type: string
        archived:
          type: boolean
        createdAt:
          type: string
          format: date-time
        category:
          $ref: '#/components/schemas/Category'
        account:
          $ref: '#/components/schemas/Account'
        incomeSource:
          $ref: '#/components/schemas/IncomeSource'
      required: [id, name, incomeSourceId, accountId, expectedDate, recurrenceType, estimatedAmount, categoryId, householdId, archived, createdAt]

    IncomeSource:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        householdId:
          type: string
        archived:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, name, householdId, archived, createdAt]

    Recipient:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        scopes:
          type: array
          items:
            $ref: '#/components/schemas/RecipientScope'
        householdId:
          type: string
        archived:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, name, scopes, householdId, archived, createdAt]

    Invitation:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        household:
          $ref: '#/components/schemas/RelationRef'
        status:
          $ref: '#/components/schemas/InvitationStatus'
        inviter:
          $ref: '#/components/schemas/RelationRef'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, email, household, status, inviter, createdAt, updatedAt]

    BudgetAllocation:
      type: object
      properties:
        id:
          type: string
        amount:
          type: number
          format: double
        date:
          type: string
          format: date-time
        budgetId:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, amount, date, budgetId, createdAt]

    UnallocatedFunds:
      type: object
      properties:
        totalFunds:
          type: number
          format: double
        totalAllocated:
          type: number
          format: double
        unallocated:
          type: number
          format: double
      required: [totalFunds, totalAllocated, unallocated]

    HouseholdPeriodSummary:
      type: object
      description: |
        Aggregated INCOME and EXPENSE totals for a household over inclusive UTC calendar dates.
        TRANSFER transactions are excluded. Both PENDING and EFFECTIVE transactions are included when
        their transaction date falls within the range. Amounts are sums of stored transaction values only
        (not account initial balances).
      properties:
        householdId:
          type: string
        dateFrom:
          type: string
          format: date
        dateTo:
          type: string
          format: date
        totalIncome:
          type: number
          format: double
        totalExpense:
          type: number
          format: double
        net:
          type: number
          format: double
      required: [householdId, dateFrom, dateTo, totalIncome, totalExpense, net]

    HouseholdAccountBalanceChartAccountMeta:
      type: object
      description: Per-account chart metadata and live balance (same staleness semantics as balance history).
      properties:
        accountId:
          type: string
        staleHistory:
          type: boolean
        historyRecalcFrom:
          type: [string, "null"]
          format: date
        currentBalance:
          type: number
          format: double
      required: [accountId, staleHistory, currentBalance]

    HouseholdAccountBalanceChartResponse:
      type: object
      description: |
        **Daily** balance series for dashboard charts over inclusive calendar dates (`dateFrom` through `dateTo`).
        `dates` has one ISO calendar date per day in that range (in order). `series` maps each account id to
        an array of balances with the same length as `dates`.

        For each account and day **D**, the value is the **latest snapshot balance** with `snapshot.date <= D`
        (forward-filled across days with no snapshot row, producing flat chart segments). If there is no snapshot
        on or before **D**, the value is **`initialBalance`** until a snapshot applies.

        For the server's **current UTC calendar date** (`today`), values are **`currentBalance`** from live account
        state (same as list account balances), so the chart matches real-time balances even when today's snapshot
        row is missing. Days after `today` still appear when `dateTo` extends into the future; they forward-fill
        from the last known balance as of each day (typically flat after the last in-range snapshot).
      properties:
        householdId:
          type: string
        dateFrom:
          type: string
          format: date
        dateTo:
          type: string
          format: date
        dates:
          type: array
          items:
            type: string
            format: date
        series:
          type: object
          additionalProperties:
            type: array
            items:
              type: number
              format: double
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/HouseholdAccountBalanceChartAccountMeta'
      required: [householdId, dateFrom, dateTo, dates, series, accounts]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required: [success]

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required: [code, message]

    ProblemDetails:
      type: object
      properties:
        status:
          type: integer
          format: int32
        title:
          type: string
        detail:
          type: string
      required: [status, title, detail]

    # ───────── Snapshot Models ─────────
    AccountBalanceSnapshot:
      type: object
      properties:
        id:
          type: string
        accountId:
          type: string
        date:
          type: string
          format: date
        balance:
          type: number
          format: double
        transactionCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, accountId, date, balance, transactionCount, createdAt]

    AccountBalanceHistory:
      type: object
      properties:
        accountId:
          type: string
        staleHistory:
          type: boolean
        historyRecalcFrom:
          type: [string, "null"]
          format: date
        data:
          type: array
          items:
            $ref: '#/components/schemas/AccountBalanceSnapshot'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'
      required: [accountId, staleHistory, data, pagination]

    AccountBalanceHistoryItem:
      type: object
      properties:
        accountId:
          type: string
        staleHistory:
          type: boolean
        historyRecalcFrom:
          type: [string, "null"]
          format: date
        snapshots:
          type: array
          items:
            $ref: '#/components/schemas/AccountBalanceSnapshot'
      required: [accountId, staleHistory, snapshots]

    AccountBalanceHistoryResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AccountBalanceHistoryItem'
      required: [data]

    AccountBalanceListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AccountBalance'
      required: [data]

    BudgetSnapshot:
      type: object
      properties:
        id:
          type: string
        budgetId:
          type: string
        date:
          type: string
          format: date
        allocatedAmount:
          type: number
          format: double
        spentAmount:
          type: number
          format: double
        remainingAmount:
          type: number
          format: double
        transactionCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, budgetId, date, allocatedAmount, spentAmount, remainingAmount, transactionCount, createdAt]

    # ───────── Pagination ─────────
    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean
      required: [total, limit, offset, hasMore]
    CreateHouseholdRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
      required: [name]
    UpdateHouseholdRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
    SetDefaultHouseholdRequest:
      type: object
      properties:
        householdId:
          type: string
      required: [householdId]
    SetDefaultBudgetRequest:
      type: object
      properties:
        householdId:
          type: string
        budgetId:
          type: string
      required: [householdId, budgetId]
    CreateAccountRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        externalIdentifier:
          type: string
        initialBalance:
          type: number
          format: double
          default: 0
        budgetIds:
          type: array
          items:
            type: string
          description: Budget IDs to link. If omitted, links to all household budgets.
      required: [name]
    UpdateAccountRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        externalIdentifier:
          type: [string, "null"]
        initialBalance:
          type: number
          format: double
        budgetIds:
          type: array
          items:
            type: string
          description: Replace budget links with this set
    ToggleAccountArchiveRequest:
      type: object
      properties:
        archived:
          type: boolean
      required: [archived]
    CreateBudgetRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        startDate:
          type: string
          format: date-time
        categoryIds:
          type: array
          items:
            type: string
          description: If omitted, links all household categories
        accountIds:
          type: array
          items:
            type: string
          description: If omitted, links all household accounts
      required: [name]
    UpdateBudgetRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        startDate:
          type: string
          format: date-time
    CreateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        types:
          type: array
          items:
            $ref: '#/components/schemas/CategoryType'
          minItems: 1
        budgetIds:
          type: array
          items:
            type: string
          description: If omitted, links to all household budgets
      required: [name, types]
    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        types:
          type: array
          items:
            $ref: '#/components/schemas/CategoryType'
          minItems: 1
        budgetIds:
          type: array
          items:
            type: string
          description: Replace budget links with this set
    CreateAllocationRequest:
      type: object
      properties:
        amount:
          type: number
          format: double
      required: [amount]
    TransferAllocationRequest:
      type: object
      properties:
        fromBudgetId:
          type: string
        toBudgetId:
          type: string
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
      required: [fromBudgetId, toBudgetId, amount]
    SplitInlineNewCategory:
      type: object
      description: |
        Inline category for a transaction split. If `type` is omitted, the server uses the category kind implied by the
        parent transaction (`EXPENSE` → expense category, `INCOME` → income category). If `type` is provided, it must
        match that implied kind.
      properties:
        name:
          type: string
          minLength: 1
        type:
          $ref: '#/components/schemas/CategoryType'
      required: [name]
    TransactionSplitWrite:
      type: object
      description: |
        Set exactly one of `categoryId`, `newCategoryName`, or `newCategory` to assign a category to the split line.
        For effective `EXPENSE` transactions with splits, each line must include `budgetId` (envelope) for that split amount.
      properties:
        categoryId:
          type: string
        newCategoryName:
          type: string
          minLength: 1
        newCategory:
          $ref: '#/components/schemas/SplitInlineNewCategory'
        budgetId:
          type: string
          description: Required for each split when the parent transaction is an effective expense with splits.
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
        subtitle:
          type: string
      required: [amount, subtitle]
    CreateTransactionRequest:
      type: object
      description: |
        `budgetId` and `splits` are mutually exclusive: if `splits` is non-empty, `budgetId` must be null and each split
        line carries its own `budgetId` for effective expenses.
        Top-level `categoryId` / `newCategory` and `splits` are mutually exclusive: if `splits` is non-empty, omit
        top-level category fields; each split line carries its own category.
      properties:
        type:
          $ref: '#/components/schemas/TransactionType'
        budgetId:
          type: [string, "null"]
          description: Used when there are no splits. Must be null when `splits` is non-empty.
        accountId:
          type: string
        categoryId:
          type: [string, "null"]
        transferToAccountId:
          type: [string, "null"]
        instanceId:
          type: [string, "null"]
          description: |
            When set, links this transaction to one occurrence: **bill instance** id if `type` is `EXPENSE`, **income instance**
            id if `type` is `INCOME`. Must belong to the same household as `accountId`. Omit for `TRANSFER` and for unlinked
            transactions. See operation description for validation and side effects (handled status on the instance).
        newCategory:
          type: object
          properties:
            name:
              type: string
              minLength: 1
            type:
              $ref: '#/components/schemas/CategoryType'
          required: [name, type]
        name:
          type: string
          minLength: 1
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
        date:
          type: string
          format: date-time
        notes:
          type: [string, "null"]
        recipientId:
          type: [string, "null"]
        newRecipientName:
          type: string
          minLength: 1
        incomeSourceId:
          type: [string, "null"]
          description: |
            When `type` is `INCOME`, links the transaction to an existing income source (payer). Ignored for other types.
        newIncomeSourceName:
          type: string
          minLength: 1
          description: |
            When `type` is `INCOME` and `incomeSourceId` is not set, get-or-create an income source by name in the household.
            Ignored for other types.
        splits:
          type: array
          description: When present and non-empty, top-level `budgetId` and top-level category fields must be unset.
          items:
            $ref: '#/components/schemas/TransactionSplitWrite'
      required: [accountId, name, amount, date]
    UpdateTransactionRequest:
      type: object
      description: |
        `budgetId` and `splits` are mutually exclusive: if `splits` is non-empty, `budgetId` must be null.
        Top-level `categoryId` and `splits` are mutually exclusive: if `splits` is non-empty (after the update),
        `categoryId` must be null.
      properties:
        type:
          $ref: '#/components/schemas/TransactionType'
        accountId:
          type: string
        budgetId:
          type: [string, "null"]
          description: Must be null when `splits` is non-empty.
        categoryId:
          type: [string, "null"]
          description: Must be null when the transaction has non-empty `splits` (after this update).
        transferToAccountId:
          type: [string, "null"]
        instanceId:
          type: [string, "null"]
          description: |
            Set or clear (`null`) the linked bill or income instance. Same rules as create: **bill instance** for `EXPENSE`,
            **income instance** for `INCOME`; must match `type` and household. Changing `type` or clearing the link updates
            prior instance state when applicable. Not valid when `type` is `TRANSFER`.
        name:
          type: string
          minLength: 1
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
        date:
          type: string
          format: date-time
        notes:
          type: [string, "null"]
        recipientId:
          type: [string, "null"]
        incomeSourceId:
          type: [string, "null"]
          description: When `type` is `INCOME`, set or clear the linked income source. Ignored for other types.
        splits:
          type: array
          description: When present and non-empty, top-level `budgetId` and top-level `categoryId` must be null.
          items:
            $ref: '#/components/schemas/TransactionSplitWrite'
    CloneTransactionRequest:
      type: object
      properties:
        date:
          type: string
          format: date-time
    CreateBillRequest:
      type: object
      description: |
        `budgetId` and `splits` are mutually exclusive: if `splits` is non-empty, `budgetId` must be null and each split
        may carry its own `budgetId`.
        Top-level `categoryId` / `newCategoryName` and `splits` are mutually exclusive: if `splits` is non-empty, omit
        top-level category fields; each split line carries its own category.
      properties:
        name:
          type: string
          minLength: 1
        recipientId:
          type: string
        newRecipientName:
          type: string
          minLength: 1
        accountId:
          type: string
        budgetId:
          type: [string, "null"]
          description: Used when there are no splits. Must be null when `splits` is non-empty.
        startDate:
          type: string
          format: date-time
        recurrenceType:
          $ref: '#/components/schemas/RecurrenceType'
        customIntervalDays:
          type: integer
          minimum: 1
        estimatedAmount:
          type: number
          format: double
          exclusiveMinimum: 0
        endDate:
          type: [string, "null"]
          format: date-time
        lastPaymentDate:
          type: string
          format: date-time
        paymentHandling:
          anyOf:
            - $ref: '#/components/schemas/BillPaymentHandling'
            - type: "null"
          description: Optional; omit to leave unset, or set to null explicitly to store no handling.
        categoryId:
          type: string
        newCategoryName:
          type: string
          minLength: 1
        splits:
          type: array
          description: When present and non-empty, top-level `budgetId` and top-level category fields must be unset.
          items:
            $ref: '#/components/schemas/BillSplitWrite'
      required: [name, accountId, startDate, recurrenceType, estimatedAmount]
    UpdateBillRequest:
      type: object
      description: |
        `budgetId` and `splits` are mutually exclusive: if `splits` is non-empty, `budgetId` must be null.
        Top-level `categoryId` and `splits` are mutually exclusive: if `splits` is non-empty (after the update),
        `categoryId` must be null.
      properties:
        name:
          type: string
        recipientId:
          type: string
        newRecipientName:
          type: string
          minLength: 1
        accountId:
          type: string
        budgetId:
          type: [string, "null"]
          description: Must be null when `splits` is non-empty.
        startDate:
          type: string
          format: date-time
        recurrenceType:
          $ref: '#/components/schemas/RecurrenceType'
        customIntervalDays:
          type: integer
          minimum: 1
        estimatedAmount:
          type: number
          format: double
          exclusiveMinimum: 0
        endDate:
          type: [string, "null"]
          format: date-time
        lastPaymentDate:
          type: [string, "null"]
          format: date-time
        paymentHandling:
          anyOf:
            - $ref: '#/components/schemas/BillPaymentHandling'
            - type: "null"
          description: Set or clear payment handling; omit to leave unchanged.
        categoryId:
          type: [string, "null"]
          description: Must be null when the bill has non-empty `splits` (after this update).
        archived:
          type: boolean
        splits:
          type: array
          description: When present and non-empty, top-level `budgetId` and top-level `categoryId` must be null.
          items:
            $ref: '#/components/schemas/BillSplitWrite'
    ArchiveBillRequest:
      type: object
      properties:
        archived:
          type: boolean
      required: [archived]
    UpdateBillInstanceRequest:
      type: object
      properties:
        updateType:
          $ref: '#/components/schemas/BillUpdateType'
        name:
          type: string
        recipient:
          type: string
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
        dueDate:
          type: string
          format: date-time
        accountId:
          type: string
        categoryId:
          type: string
      required: [updateType]
    UpdateIncomeInstanceRequest:
      type: object
      properties:
        name:
          type: string
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
        expectedDate:
          type: string
          format: date-time
        accountId:
          type: string
        categoryId:
          type: string
    CreateTransferRequest:
      type: object
      properties:
        fromAccountId:
          type: string
        toAccountId:
          type: string
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
        date:
          type: string
          format: date-time
        notes:
          type: string
      required: [fromAccountId, toAccountId, amount, date]
    UpdateTransferRequest:
      type: object
      properties:
        fromAccountId:
          type: string
        toAccountId:
          type: string
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
        date:
          type: string
          format: date-time
        notes:
          type: [string, "null"]
    CreateIncomeRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        incomeSourceId:
          type: string
        newIncomeSourceName:
          type: string
          minLength: 1
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
        expectedDate:
          type: string
          format: date-time
        accountId:
          type: string
        categoryId:
          type: string
        newCategoryName:
          type: string
        recurrenceType:
          $ref: '#/components/schemas/RecurrenceType'
        customIntervalDays:
          type: [integer, "null"]
        endDate:
          type: [string, "null"]
          format: date-time
      required: [name, amount, expectedDate, accountId, recurrenceType]
    UpdateIncomeRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        incomeSourceId:
          type: string
        newIncomeSourceName:
          type: string
          minLength: 1
        amount:
          type: number
          format: double
          exclusiveMinimum: 0
        expectedDate:
          type: string
          format: date-time
        accountId:
          type: string
        categoryId:
          type: string
        newCategoryName:
          type: string
        recurrenceType:
          $ref: '#/components/schemas/RecurrenceType'
        customIntervalDays:
          type: [integer, "null"]
        endDate:
          type: [string, "null"]
          format: date-time
    ArchiveIncomeRequest:
      type: object
      properties:
        archived:
          type: boolean
      required: [archived]
    ArchiveCategoryRequest:
      type: object
      properties:
        archived:
          type: boolean
      required: [archived]
    ArchiveRecipientRequest:
      type: object
      properties:
        archived:
          type: boolean
      required: [archived]
    ArchiveIncomeSourceRequest:
      type: object
      properties:
        archived:
          type: boolean
      required: [archived]
    CreateRecipientRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
      required: [name]
    GetOrCreateRecipientRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
      required: [name]
    UpdateRecipientRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
    CreateInvitationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [email]

  # ───────── Reusable Parameters ─────────
  parameters:
    householdId:
      name: householdId
      in: path
      required: true
      schema:
        type: string
    budgetId:
      name: budgetId
      in: path
      required: true
      schema:
        type: string
    accountId:
      name: accountId
      in: path
      required: true
      schema:
        type: string
    categoryId:
      name: categoryId
      in: path
      required: true
      schema:
        type: string
    transactionId:
      name: transactionId
      in: path
      required: true
      schema:
        type: string
    recipientId:
      name: recipientId
      in: path
      required: true
      schema:
        type: string
    incomeId:
      name: incomeId
      in: path
      required: true
      schema:
        type: string
    incomeSourceId:
      name: incomeSourceId
      in: path
      required: true
      schema:
        type: string
    billId:
      name: billId
      in: path
      required: true
      schema:
        type: string
    invitationId:
      name: invitationId
      in: path
      required: true
      schema:
        type: string
    limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        maximum: 100
      description: Maximum number of items to return. Omit to return all items. Set to 0 to return only the pagination count metadata (no data items).
    offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
      description: Number of items to skip

# ═══════════════════════════════════════════════
# Paths
# ═══════════════════════════════════════════════
paths:
  # ─────────────────────────
  # HOUSEHOLDS
  # ─────────────────────────
  /households:
    get:
      operationId: listHouseholds
      summary: List all households for the authenticated user, along with the default household ID.
      tags: [Households]
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: List of households (empty list when no matches)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Household'
                  defaultHouseholdId:
                    type: [string, "null"]
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      operationId: createHousehold
      summary: Create a new household
      tags: [Households]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHouseholdRequest'
      responses:
        '201':
          description: Created household
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Household'

  /households/{householdId}:
    parameters:
      - $ref: '#/components/parameters/householdId'
    get:
      operationId: getHousehold
      summary: Get a specific household
      tags: [Households]
      responses:
        '200':
          description: Household details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Household'
        '404':
          description: Household not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    patch:
      operationId: updateHousehold
      summary: Update a household
      tags: [Households]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHouseholdRequest'
      responses:
        '200':
          description: Updated household
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Household'
    delete:
      operationId: deleteHousehold
      summary: Delete a household
      tags: [Households]
      responses:
        '200':
          description: Deleted household
  /households/{householdId}/members:
    parameters:
      - $ref: '#/components/parameters/householdId'
    get:
      operationId: getHouseholdMembers
      summary: Get household members with user details (from Clerk)
      tags: [Households]
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: List of household members
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/HouseholdMember'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'

  /households/{householdId}/members/{userId}:
    parameters:
      - $ref: '#/components/parameters/householdId'
      - name: userId
        in: path
        required: true
        schema:
          type: string
    put:
      operationId: addHouseholdMember
      summary: Add a user to a household
      tags: [Households]
      responses:
        '201':
          description: User added
        '409':
          description: User already a member
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    delete:
      operationId: removeHouseholdMember
      summary: Remove a user from a household
      tags: [Households]
      responses:
        '200':
          description: User removed
        '412':
          description: Cannot remove last user
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /user-settings/default-household:
    put:
      operationId: setDefaultHousehold
      summary: Set the default household for the authenticated user
      tags: [UserSettings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetDefaultHouseholdRequest'
      responses:
        '200':
          description: Default household updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          description: User is not a member of the household
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Household not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  # ─────────────────────────
  # ACCOUNTS
  # ─────────────────────────
  /households/{householdId}/accounts:
    parameters:
      - $ref: '#/components/parameters/householdId'
    get:
      operationId: listAccounts
      summary: List accounts for a household
      tags: [Accounts]
      parameters:
        - name: budgetId
          in: query
          schema:
            type: string
          description: Filter by budget linkage
        - name: excludeArchived
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: List of accounts (empty list when no matches)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccountWithBalance'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
        '404':
          description: Household not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      operationId: createAccount
      summary: Create a new account
      tags: [Accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        '201':
          description: Created account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'

  /accounts/{accountId}:
    parameters:
      - $ref: '#/components/parameters/accountId'
    get:
      operationId: getAccount
      summary: Get account by ID
      tags: [Accounts]
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDetail'
    patch:
      operationId: updateAccount
      summary: Update an account
      tags: [Accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountRequest'
      responses:
        '200':
          description: Updated account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
    delete:
      operationId: deleteAccount
      summary: Delete an account (must have no transactions, bills, or transfers)
      tags: [Accounts]
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '412':
          description: Account has linked records
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /accounts/{accountId}/balance:
    parameters:
      - $ref: '#/components/parameters/accountId'
    get:
      operationId: getAccountBalance
      summary: Get current balance for an account
      description: |
        Returns the live current balance updated synchronously on transaction mutations.
